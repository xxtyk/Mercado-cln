<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado CLN - Servicios</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #121212; 
            color: white; 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }
        /* Botón de Panel arriba a la izquierda */
        .btn-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #00d4ff; /* Azul Cyan */
            color: black;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
        }
        h1 { color: #00d4ff; margin-top: 60px; }
        .contenedor {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .producto {
            background: #1e1e1e;
            width: 280px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        .producto img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .precio { font-size: 1.5rem; color: #2ecc71; font-weight: bold; margin: 10px 0; }
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            width: 90%;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="/admin" class="btn-panel">PANEL</a>

    <h1>Mercado CLN: Aire Acondicionado</h1>

    <div class="contenedor">
        {% for p in productos %}
        <div class="producto">
            <img src="{{ p.imagen }}" alt="{{ p.nombre }}">
            <h3>{{ p.nombre }}</h3>
            <p class="precio">${{ p.precio }}</p>
            <a href="https://wa.me/526679771409?text=Hola Hector, me interesa el servicio de: {{ p.nombre }}" target="_blank" class="btn-whatsapp">
                WhatsApp
            </a>
        </div>
        {% else %}
        <div style="padding: 50px; color: #888;">
            <p>No hay servicios todavía. ¡Entra al PANEL!</p>
        </div>
        {% endfor %}
    </div>

</body>
</html>
