<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado CLN - Servicios de Aire Acondicionado</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: white; 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }
        h1 { color: #00d4ff; margin-bottom: 30px; }
        .contenedor {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .producto {
            background: #1e1e1e;
            width: 280px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .producto img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 10px; 
        }
        .precio { 
            font-size: 1.5rem; 
            color: #2ecc71; 
            font-weight: bold; 
            margin: 10px 0;
        }
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { background-color: #128c7e; }
        .vacio { padding: 50px; color: #888; }
    </style>
</head>
<body>

    <h1>Mercado CLN: Aire Acondicionado</h1>

    <div class="contenedor">
        {% for p in productos %}
        <div class="producto">
            <img src="{{ p.imagen }}" alt="{{ p.nombre }}">
            <h3>{{ p.nombre }}</h3>
            <p class="precio">${{ p.precio }}</p>
            <a href="https://wa.me/526679771409?text=Hola Hector, me interesa el servicio de: {{ p.nombre }} que vi en Mercado CLN" target="_blank" class="btn-whatsapp">
                Solicitar por WhatsApp
            </a>
        </div>
        {% else %}
        <div class="vacio">
            <p>No hay servicios publicados todavía. ¡Ve al panel de admin!</p>
        </div>
        {% endfor %}
    </div>

    <footer style="margin-top: 50px; font-size: 0.8rem; color: #555;">
        <p>&copy; 2026 Mercado en Línea Culiacán</p>
    </footer>

</body>
</html>
