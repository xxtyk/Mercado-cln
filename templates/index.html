<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

<!-- META PREVIEW -->
<meta property="og:type" content="website">
<meta property="og:title" content="Haz tu pedido aquí | Mercado en Línea Culiacán">
<meta property="og:description" content="Entregas el mismo día y pagas al recibir.">
<meta property="og:image" content="https://mercado-cln-1.onrender.com/IMG-20260114-WA0001.jpg">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* BOTÓN INSTALAR */
#btnInstalarApp {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: #007bff;
  color: white;
  border: none;
  border-radius: 14px;
  padding: 16px 28px;
  font-size: 20px;
  font-weight: bold;
  z-index: 99999;
  box-shadow: 0 5px 14px rgba(0,0,0,.35);
}
</style>
</head>

<body>

<!-- TU APP (NO SE TOCA) -->
<div id="app"></div>

<!-- BOTÓN -->
<button id="btnInstalarApp">📲 Descargar app</button>

<script>
let eventoInstalar = null;

// ANDROID (instalación directa)
window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  eventoInstalar = e;
});

// CLICK BOTÓN
document.getElementById("btnInstalarApp").addEventListener("click", async function() {

  // Si Android permite instalar directo
  if (eventoInstalar) {
    eventoInstalar.prompt();
    await eventoInstalar.userChoice;
    eventoInstalar = null;
    return;
  }

  // iPhone / otros
  alert("Para instalar:\n\nToca el botón de compartir ↑\ny luego: Agregar a inicio");
});

// Cuando ya se instaló
window.addEventListener("appinstalled", function() {
  document.getElementById("btnInstalarApp").style.display = "none";
});
</script>

</body>
</html>
