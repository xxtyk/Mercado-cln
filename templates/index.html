<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

<meta property="og:type" content="website">
<meta property="og:title" content="Haz tu pedido aquí | Mercado en Línea Culiacán">
<meta property="og:description" content="Entregas el mismo día y pagas al recibir.">
<meta property="og:image" content="https://mercado-cln-1.onrender.com/IMG-20260114-WA0001.jpg">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
}

/* PANTALLA NEGRA */
#pantallaInicio{
  position:fixed;
  inset:0;
  background:#000;
  color:white;
  z-index:99998;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:25px;
}

#pantallaInicio img{
  width:190px;
  max-width:75%;
  margin-bottom:18px;
}

#pantallaInicio h1{
  font-size:30px;
  margin:0 0 16px;
}

#btnInstalarApp{
  background:#007bff;
  color:white;
  border:none;
  border-radius:16px;
  padding:16px 28px;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 5px 14px rgba(0,0,0,.35);
}

.aviso{
  margin-top:20px;
  font-size:20px;
  line-height:1.4;
  color:#ddd;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="pantallaInicio">
  <div>
    <img src="/IMG-20260114-WA0001.jpg" alt="Mercado en Línea Culiacán">

    <h1>MERCADO EN LÍNEA CULIACÁN</h1>

    <button id="btnInstalarApp">📲 Descargar aquí<br>solo Android</button>

    <div class="aviso">
      Si no quieres descargar,<br>
      espera 2 segundos y entra al catálogo.
    </div>
  </div>
</div>

<div id="app"></div>

<script>
let eventoInstalar = null;

setTimeout(function(){
  const pantalla = document.getElementById("pantallaInicio");
  if(pantalla){
    pantalla.style.display = "none";
  }
}, 2000);

window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  eventoInstalar = e;
});

document.getElementById("btnInstalarApp").addEventListener("click", async function(){
  if(eventoInstalar){
    eventoInstalar.prompt();
    await eventoInstalar.userChoice;
    eventoInstalar = null;
  }else{
    alert("La descarga de app es solo para Android.\n\nSi estás en iPhone, espera 2 segundos y entra al catálogo.");
  }
});

window.addEventListener("appinstalled", function(){
  const pantalla = document.getElementById("pantallaInicio");
  if(pantalla){
    pantalla.style.display = "none";
  }
});
</script>

</body>
</html>
