<!DOCTYPE html>
<html>
<head>
    <title>Mercado en Línea Culiacán</title>
</head>
<body>

    <h1>🛒 Mercado en Línea Culiacán</h1>

    <img src="{{ url_for('static', filename='logo.png') }}" width="150">

    <h2>Productos</h2>

    {% for producto in productos %}
        <div>
            <h3>{{ producto.nombre }}</h3>
            <p>Precio: ${{ producto.precio }}</p>
        </div>
    {% endfor %}

</body>
</html>
