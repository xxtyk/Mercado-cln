<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercado en Línea</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: Arial;
    background:#f5f5f5;
}

/* HEADER */
header {
    background:#00a884;
    color:white;
    padding:15px;
    text-align:center;
    font-size:18px;
    position:sticky;
    top:0;
}

/* GRID PRODUCTOS */
.contenedor {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

/* TARJETA */
.producto {
    background:white;
    border-radius:12px;
    padding:8px;
}

.producto img {
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:10px;
}

.producto h3 {
    font-size:14px;
    margin:5px 0;
}

.precio {
    color:green;
    font-weight:bold;
}

/* BOTÓN */
.btn {
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00a884;
    color:white;
    font-size:14px;
}

/* BOTÓN CARRITO */
.carrito {
    position:fixed;
    bottom:15px;
    right:15px;
    background:black;
    color:white;
    padding:18px;
    border-radius:50%;
    font-size:18px;
}

/* FORMULARIO */
.formulario {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:100%;
    background:white;
    padding:20px;
    display:none;
    overflow:auto;
}

input, select {
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

.finalizar {
    width:100%;
    padding:15px;
    background:#00a884;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}
</style>
</head>

<body>

<header>🛒 Mercado en Línea</header>

<div class="contenedor">
{% for p in productos %}
<div class="producto">
<img src="{{p.imagen}}">
<h3>{{p.nombre}}</h3>
<p class="precio">$ {{p.precio}}</p>
<button class="btn" onclick="agregar('{{p.nombre}}', {{p.precio}})">Agregar</button>
</div>
{% endfor %}
</div>

<div class="carrito" onclick="abrirFormulario()">🛒</div>

<div class="formulario" id="formulario">

<h2>Finalizar pedido</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="WhatsApp">
<input id="direccion" placeholder="Calle, número, colonia">

<select id="envio">
<option value="0">Recoger en bodega</option>
<option value="40">Envío Culiacán +$40</option>
</select>

<h3 id="total">Total: $0</h3>

<button class="finalizar" onclick="finalizar()">Finalizar pedido</button>

</div>

<script>
let carrito = [];

function agregar(nombre, precio){
    carrito.push({nombre, precio});
    alert("Agregado");
}

function abrirFormulario(){
    if(carrito.length == 0){
        alert("Carrito vacío");
        return;
    }

    document.getElementById("formulario").style.display = "block";
    calcularTotal();
}

function calcularTotal(){
    let envio = parseInt(document.getElementById("envio").value);
    let total = carrito.reduce((sum, p) => sum + p.precio, 0) + envio;
    document.getElementById("total").innerText = "Total: $" + total;
}

document.getElementById("envio").addEventListener("change", calcularTotal);

function finalizar(){
    let nombre = document.getElementById("nombre").value;
    let telefono = document.getElementById("telefono").value;
    let direccion = document.getElementById("direccion").value;
    let envio = parseInt(document.getElementById("envio").value);

    let total = carrito.reduce((sum, p) => sum + p.precio, 0) + envio;

    let pedido = {
        nombre,
        telefono,
        direccion,
        productos: carrito,
        envio,
        total
    };

    fetch('/guardar_pedido', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(pedido)
    });

    alert("Pedido guardado ✅");

    carrito = [];
    document.getElementById("formulario").style.display = "none";
}
</script>

</body>
</html>
