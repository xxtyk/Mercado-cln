<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado CLN - Categorías</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#121212; color:white; margin:0; padding:20px; }
h1 { text-align:center; color:#00d4ff; }
.contenedor { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin-top:20px; }
.categoria { background:#1e1e1e; width:150px; padding:20px; border-radius:15px; text-align:center; cursor:pointer; transition:0.3s; }
.categoria:hover { background:#00d4ff; color:black; }
a { text-decoration:none; color:inherit; }
</style>
</head>
<body>
<h1>Categorías</h1>
<div class="contenedor">
{% for c in categorias %}
<a href="/categoria/{{ c }}">
    <div class="categoria">{{ c }}</div>
</a>
{% else %}
<p>No hay categorías aún. Agrega desde el Panel.</p>
{% endfor %}
</div>
</body>
</html>
