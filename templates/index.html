<!DOCTYPE html>
<html>
<head>
    <title>Mercado en Línea</title>
</head>
<body>

<h1>🛒 Mercado en Línea Culiacán</h1>

<a href="/admin">Ir al panel</a>

<hr>

{% for p in productos %}
    <div>
        <h3>{{ p.nombre }}</h3>
        <img src="{{ p.imagen }}" width="150">
        <p>$ {{ p.precio }}</p>
        <p>{{ p.categoria }}</p>
    </div>
{% endfor %}

</body>
</html>
