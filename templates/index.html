<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado en línea Culiacán</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }
        .header {
            background: #000;
            color: #fff;
            padding: 16px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        .subtitulo {
            padding: 14px 16px 6px;
            color: #555;
            font-size: 16px;
            font-weight: bold;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            text-decoration: none;
            color: #000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        .card p {
            margin: 0;
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }
        .vacio {
            padding: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">Mercado en línea Culiacán</div>
    <div class="subtitulo">CATEGORÍAS</div>

    {% if categorias %}
    <div class="grid">
        {% for categoria in categorias %}
        <a class="card" href="{{ url_for('categoria', nombre=categoria.nombre) }}">
            {% if categoria.foto %}
                <img src="{{ url_for('static', filename=categoria.foto) }}" alt="{{ categoria.nombre }}">
            {% else %}
                <img src="https://via.placeholder.com/400x300?text=Categoria" alt="{{ categoria.nombre }}">
            {% endif %}
            <p>{{ categoria.nombre }}</p>
        </a>
        {% endfor %}
    </div>
    {% else %}
    <div class="vacio">Todavía no hay categorías cargadas.</div>
    {% endif %}
</body>
</html>
