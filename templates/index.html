<!DOCTYPE html>
<html>
<head>
    <title>Mercado en Línea</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        header {
            background: #00a884;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .producto {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .producto img {
            width: 100%;
            border-radius: 10px;
        }

        .producto h3 {
            margin: 5px 0;
            font-size: 16px;
        }

        .precio {
            color: green;
            font-weight: bold;
        }

        .btn {
            display: block;
            text-align: center;
            background: #00a884;
            color: white;
            padding: 8px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 5px;
        }

        .admin-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: black;
            color: white;
            padding: 10px;
            border-radius: 50%;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>
    🛒 Mercado en Línea Culiacán
</header>

<div class="contenedor">
    {% for p in productos %}
    <div class="producto">
        <img src="{{ p.imagen }}">
        <h3>{{ p.nombre }}</h3>
        <p class="precio">$ {{ p.precio }}</p>

        <a class="btn" href="https://wa.me/526671377298?text=Quiero%20comprar%20{{p.nombre}}">
            Comprar
        </a>
    </div>
    {% endfor %}
</div>

<a href="/admin" class="admin-btn">⚙️</a>

</body>
</html>
