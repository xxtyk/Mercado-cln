<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado CLN - Categorías</title>
<style>
body { font-family:'Segoe UI', sans-serif; background:#121212; color:white; margin:0; padding:20px; }
h1 { text-align:center; color:#00d4ff; }
.contenedor { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin-top:20px; }
.categoria { background:#1e1e1e; width:160px; height:160px; display:flex; align-items:center; justify-content:center; border-radius:20px; font-size:1.2rem; cursor:pointer; transition:0.3s; }
.categoria:hover { background:#00d4ff; color:black; }
a { text-decoration:none; color:inherit; }
.boton-agregar { display:inline-block; margin-top:40px; padding:20px; background:#00d4ff; color:black; font-weight:bold; border-radius:15px; font-size:1.2rem; text-decoration:none; }
.boton-agregar:hover { background:#009ecf; }
</style>
</head>
<body>
<h1>Categorías</h1>
<div class="contenedor">
{% for c in categorias %}
<a href="/categoria/{{ c }}">
    <div class="categoria">{{ c }}</div>
</a>
{% else %}
<a href="/admin" class="boton-agregar">+ Agregar mi primera categoría</a>
{% endfor %}
</div>
</body>
</html>
