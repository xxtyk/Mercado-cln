<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Mercado CLN</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; max-width: 400px; margin: 50px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .btn-save { background-color: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 15px; }
        .btn-back { display: inline-block; color: #007bff; text-decoration: none; font-weight: bold; margin-top: 10px; }
        input[type="text"] { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Configuración</h2>
        
        <form action="/guardar_config" method="POST">
            <label>Nombre de usuario:</label><br>
            <input type="text" name="usuario" value="admin" placeholder="Ej: Hector">
            
            <div style="margin-bottom: 20px;">
                <input type="checkbox" id="notif" name="notificaciones" checked>
                <label for="notif">Notificaciones activas</label>
            </div>

            <button type="submit" class="btn-save">Guardar cambios</button>
        </form>

        <a href="/" class="btn-back">⬅ Volver al catálogo</a>
    </div>

    <footer style="margin-top: 50px; color: #888; font-size: 12px;">
        <p>&copy; 2026 Mercado en Línea Culiacán</p>
    </footer>

</body>
</html>
