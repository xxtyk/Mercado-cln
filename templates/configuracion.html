<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administrador - Mercado Culiacán</title>
<style>
body{margin:0;font-family:Arial;background:#f8f8f8;}
#panel{display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{text-align:center;}
button{margin:10px 0;padding:15px 20px;width:90%;max-width:300px;font-size:18px;border:none;border-radius:8px;background:#007bff;color:white;cursor:pointer;}
button:hover{background:#0056b3;}
section{width:100%;max-width:400px;margin-top:20px;padding:15px;background:white;border-radius:8px;display:none;flex-direction:column;}
label{display:flex;flex-direction:column;margin-bottom:10px;}
input,select,textarea{margin-top:5px;padding:10px;font-size:16px;}
</style>
<script>
function mostrar(seccion){
    const secciones = document.querySelectorAll('section');
    secciones.forEach(s => s.style.display='none');
    document.getElementById(seccion).style.display='flex';
}
</script>
</head>
<body>
<div id="panel">
  <h1>Panel Administrador</h1>

  <!-- Botones principales -->
  <button onclick="mostrar('vista_catalogo')">1. Ver catálogo (como cliente)</button>
  <button onclick="mostrar('config_categorias')">2. Configurar Categorías</button>
  <button onclick="mostrar('config_productos')">3. Configurar Productos</button>
  <button onclick="mostrar('config_logo')">4. Configurar Logo de Inicio</button>

  <!-- Secciones -->
  <section id="vista_catalogo">
    <h2>Vista del catálogo</h2>
    <a href="/">Ver catálogo como cliente</a>
  </section>

  <section id="config_categorias">
    <h2>Configurar Categorías</h2>
    <form action="/agregar_categoria" method="POST" enctype="multipart/form-data">
