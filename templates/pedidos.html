<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido - {{ producto.nombre }}</title>
<style>
body{font-family:Arial;margin:20px;background:#f8f8f8;}
form{max-width:400px;margin:0 auto;background:white;padding:20px;border-radius:8px;box-shadow:2px2px5px rgba(0,0,0,0.1);}
label{display:flex;flex-direction:column;margin-bottom:10px;}
input,select,textarea,button{margin-top:5px;padding:10px;font-size:16px;width:100%;box-sizing:border-box;}
button{background:#007bff;color:white;border:none;border-radius:5px;cursor:pointer;}
button:hover{background:#0056b3;}
</style>
</head>
<body>
  <h1 style="text-align:center;">Pedido: {{ producto.nombre }}</h1>
  <form method="POST">
    <label>Nombre:
      <input type="text" name="nombre" required>
    </label>
    <label>WhatsApp:
      <input type="text" name="whatsapp" required>
    </label>
    <label>Colonia:
      <input type="text" name="colonia" required>
    </label>
    <label>Calle y número:
      <input type="text" name="calle_numero" required>
    </label>
    <label>Entrega:
      <select name="entrega">
        <option value="Recojer">Pasa a recoger a bodega</option>
        <option value="Domicilio">Entrega a domicilio (+40 pesos)</option>
      </select>
    </label>
    <label>Nota:
      <textarea name="nota" rows="3"></textarea>
    </label>
    <p>Precio producto: ${{ producto.precio }}</p>
    <button type="submit">Finalizar Pedido</button>
  </form>
  <a href="{{ url_for('index') }}">Volver al catálogo</a>
</body>
</html>
