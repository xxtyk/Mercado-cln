<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ nombre_categoria }}</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

.header {
    background: black;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.info {
    padding: 10px;
}

.nombre {
    font-weight: bold;
}

.precio {
    color: green;
    font-weight: bold;
}

.btn {
    display: block;
    margin-top: 10px;
    background: #25D366;
    color: white;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header">← {{ nombre_categoria }}</div>

<div class="grid">
{% for p in productos %}
<div class="card">
    {% if p.foto %}
    <img src="/static/{{ p.foto }}">
    {% else %}
    <img src="https://via.placeholder.com/300x200">
    {% endif %}

    <div class="info">
        <div class="nombre">{{ p.nombre }}</div>
        <div class="precio">$ {{ p.precio }}</div>

        <a class="btn" href="https://wa.me/526679771409?text=Quiero {{ p.nombre }}">
            Comprar
        </a>
    </div>
</div>
{% endfor %}
</div>

</body>
</html>
