<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ producto.nombre }}</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.header{
    background:#000;
    padding:12px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:10;
}

.header a{
    position:absolute;
    left:10px;
    top:12px;
    color:white;
    text-decoration:none;
    font-size:22px;
}

.header h1{
    color:#fff;
    margin:0;
    font-size:18px;
}

.container{
    padding:10px;
}

.img-producto{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    display:block;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:14px;
    margin-top:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.nombre{
    font-size:18px;
    font-weight:bold;
}

.precio{
    color:#2e7d32;
    font-weight:bold;
    margin-top:6px;
    font-size:20px;
}

.descripcion{
    margin-top:8px;
    color:#555;
}

.cantidad-box{
    margin-top:14px;
}

.cantidad-label{
    font-weight:bold;
    margin-bottom:8px;
}

.controles-cantidad{
    display:flex;
    align-items:center;
    gap:10px;
}

.btn-cantidad{
    width:48px;
    height:48px;
    border:none;
    background:#000;
    color:white;
    border-radius:8px;
    font-size:26px;
    line-height:1;
    cursor:pointer;
}

.input-cantidad{
    width:80px;
    height:48px;
    text-align:center;
    font-size:20px;
    border:1px solid #ccc;
    border-radius:8px;
}

form{
    margin-top:12px;
}

button.agregar{
    width:100%;
    padding:12px;
    border:none;
    background:#000;
    color:white;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
    <a href="{{ url_for('ver_categoria', categoria_id=producto.categoria_id) }}">←</a>
    <h1>{{ producto.nombre }}</h1>
</div>

<div class="container">

    {% if producto.foto %}
        <img src="{{ resolver_imagen(producto.foto) }}" class="img-producto" alt="{{ producto.nombre }}">
    {% endif %}

    <div class="card">
        <div class="nombre">{{ producto.nombre }}</div>
        <div class="precio">${{ producto.precio|int }}</div>

        {% if producto.descripcion %}
            <div class="descripcion">{{ producto.descripcion }}</div>
        {% endif %}

        <form action="{{ url_for('agregar_al_carrito', producto_id=producto.id) }}" method="POST">
            <div class="cantidad-box">
                <div class="cantidad-label">Cantidad</div>

                <div class="controles-cantidad">
                    <button type="button" class="btn-cantidad" onclick="cambiarCantidad(-1)">−</button>
                    <input id="cantidad" class="input-cantidad" type="number" name="cantidad" value="1" min="1">
                    <button type="button" class="btn-cantidad" onclick="cambiarCantidad(1)">+</button>
                </div>
            </div>

            <input type="hidden" name="siguiente" value="carrito">
            <button type="submit" class="agregar">Agregar al carrito</button>
        </form>
    </div>

</div>

<script>
function cambiarCantidad(cambio) {
    const input = document.getElementById("cantidad");
    let valor = parseInt(input.value) || 1;
    valor += cambio;
    if (valor < 1) {
        valor = 1;
    }
    input.value = valor;
}
</script>

</body>
</html>
