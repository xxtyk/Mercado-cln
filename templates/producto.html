<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ nombre_categoria }}</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

.header {
    background: black;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.info {
    padding: 10px;
}

.nombre {
    font-weight: bold;
    font-size: 18px;
}

.precio {
    color: green;
    font-weight: bold;
    margin-top: 5px;
    margin-bottom: 10px;
}

input, textarea, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    box-sizing: border-box;
    font-size: 16px;
}

.btn {
    display: block;
    margin-top: 10px;
    background: #25D366;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">← {{ nombre_categoria }}</div>

<div class="grid">
{% for p in productos %}
<div class="card">
    {% if p.foto %}
    <img src="/static/{{ p.foto }}">
    {% else %}
    <img src="https://via.placeholder.com/300x200">
    {% endif %}

    <div class="info">
        <div class="nombre">{{ p.nombre }}</div>
        <div class="precio">$ {{ p.precio }}</div>

        <form action="/finalizar_pedido" method="POST">
            <input type="hidden" name="producto" value="{{ p.nombre }}">
            <input type="hidden" name="precio" value="{{ p.precio }}">

            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="colonia" placeholder="Colonia" required>
            <input type="text" name="calle" placeholder="Calle" required>
            <input type="text" name="celular" placeholder="Celular" required>

            <textarea name="nota" placeholder="Nota"></textarea>

            <select name="entrega" required>
                <option value="domicilio">A domicilio (+40)</option>
                <option value="bodega">Recoger en bodega</option>
            </select>

            <select name="vendedor" required>
                <option value="">Selecciona vendedor</option>
                {% for v in vendedores %}
                <option value="{{ v }}">{{ v }}</option>
                {% endfor %}
            </select>

            <button class="btn" type="submit">Finalizar pedido</button>
        </form>
    </div>
</div>
{% endfor %}
</div>

</body>
</html>
