<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ producto.nombre }}</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:#000;
    padding:12px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:10;
}

.header a{
    position:absolute;
    left:10px;
    top:12px;
    color:white;
    text-decoration:none;
    font-size:22px;
}

.header h1{
    color:#fff;
    margin:0;
    font-size:18px;
}

/* CONTENIDO */
.container{
    padding:10px;
}

/* IMAGEN */
.img-producto{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:10px;
    padding:14px;
    margin-top:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.nombre{
    font-size:18px;
    font-weight:bold;
}

.precio{
    color:#2e7d32;
    font-weight:bold;
    margin-top:6px;
    font-size:20px;
}

.descripcion{
    margin-top:8px;
    color:#555;
}

/* BOTÓN */
form{
    margin-top:12px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#000;
    color:white;
    border-radius:8px;
    font-size:16px;
}
</style>
</head>
<body>

<div class="header">
    <a href="{{ url_for('catalogo') }}">←</a>
    <h1>{{ producto.nombre }}</h1>
</div>

<div class="container">

    {% if producto.foto %}
        <img src="{{ resolver_imagen(producto.foto) }}" class="img-producto">
    {% endif %}

    <div class="card">
        <div class="nombre">{{ producto.nombre }}</div>
        <div class="precio">${{ producto.precio|int }}</div>

        {% if producto.descripcion %}
            <div class="descripcion">{{ producto.descripcion }}</div>
        {% endif %}

        <form action="{{ url_for('agregar_al_carrito', producto_id=producto.id) }}" method="POST">
            <input type="hidden" name="cantidad" value="1">
            <input type="hidden" name="siguiente" value="carrito">
            <button type="submit">Agregar al carrito</button>
        </form>
    </div>

</div>

</body>
</html>
