<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ nombre_categoria }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .header {
            background: black;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .back {
            color: white;
            text-decoration: none;
            margin-right: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 10px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .info {
            padding: 10px;
        }

        .nombre {
            font-weight: bold;
        }

        .precio {
            color: green;
            margin-top: 5px;
        }

        .
