<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f5c4d;
    color:white;
}

.container{
    padding:15px;
}

h2{
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-bottom:2px solid #ccc;
    background:transparent;
    color:white;
}

input::placeholder, textarea::placeholder{
    color:#ccc;
}

.galeria{
    margin:15px 0;
}

button{
    width:100%;
    padding:15px;
    background:#2ecc71;
    border:none;
    color:white;
    font-size:18px;
    position:fixed;
    bottom:0;
    left:0;
}
</style>
</head>

<body>

<div class="container">
    <h2>PRODUCTO</h2>

    <form action="/agregar" method="POST" enctype="multipart/form-data">

        <label>* Galería (JPG o PNG)</label>
        <div class="galeria">
            <input type="file" name="imagen" required>
        </div>

        <label>* Nombre</label>
        <input type="text" name="nombre" placeholder="Ej: Shampoo negro" required>

        <label>* Descripción</label>
        <textarea name="descripcion" placeholder="Descripción"></textarea>

        <label>Catálogo / Categoría</label>
        <input type="text" name="categoria" placeholder="Ej: Cuidado del cabello">

        <label>* Precio Unitario</label>
        <input type="number" name="precio" placeholder="160" required>

        <button type="submit">GUARDAR</button>

    </form>
</div>

</body>
          </html>
