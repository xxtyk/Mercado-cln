
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <style>
        *{box-sizing:border-box;}
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f5f5;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .caja{
            width:100%;
            max-width:380px;
            background:#fff;
            border-radius:18px;
            padding:24px;
            box-shadow:0 4px 18px rgba(0,0,0,0.12);
        }
        h1{
            margin:0 0 18px 0;
            text-align:center;
            font-size:30px;
        }
        input{
            width:100%;
            padding:14px;
            margin-bottom:12px;
            border:1px solid #ccc;
            border-radius:12px;
            font-size:16px;
        }
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#000;
            color:#fff;
            font-size:18px;
            font-weight:bold;
        }
        .error{
            color:#d11a2a;
            margin-bottom:12px;
            text-align:center;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="caja">
        <h1>Administrador</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login_admin') }}">
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
