<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Datos de entrega</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    color: #212121;
}

.contenedor-principal {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    background: white;
    display: flex;
    flex-direction: column;
}

.barra {
    background: #1976d2;
    color: white;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}

.volver {
    color: white;
    text-decoration: none;
    font-size: 24px;
    line-height: 1;
}

.titulo {
    font-size: 20px;
    font-weight: 700;
}

.contenedor {
    padding: 16px;
    padding-bottom: 140px;
}

.intro {
    font-size: 14px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 18px;
}

.grupo {
    margin-bottom: 16px;
}

.label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: #555;
    margin-bottom: 6px;
}

input, select, textarea {
    width: 100%;
    padding: 11px 12px;
    border-radius: 7px;
    border: 1.5px solid #e0e0e0;
    background: white;
    font-size: 14px;
    color: #212121;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #1976d2;
    box-shadow: 0 0 0 2px rgba(25,118,210,0.12);
}

textarea {
    min-height: 80px;
    resize: vertical;
}

.opciones-entrega {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.opcion input {
    display: none;
}

.caja-opcion {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-radius: 10px;
    border: 2px solid #e0e0e0;
}

.opcion input:checked + .domicilio {
    border-color: #1976d2;
    background: #e3f2fd;
}

.opcion input:checked + .bodega {
    border-color: #2e7d32;
    background: #e8f5e9;
}

.resumen {
    margin-top: 18px;
    background: #f9f9f9;
    border-radius: 10px;
    padding: 14px;
}

.fila-total {
    font-size: 16px;
    font-weight: bold;
}

.metodo-pago {
    margin-top: 16px;
    background: #e8f5e9;
    border-radius: 10px;
    padding: 12px;
}

.aviso {
    margin-top: 12px;
    background: #e3f2fd;
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
}

.pie {
    position: sticky;
    bottom: 0;
    background: white;
    padding: 16px;
}

/* BOTÓN GRANDE */
.boton {
    width: 100%;
    padding: 22px;
    background: #1db510;
    color: white;
    border: none;
    font-size: 24px;
    font-weight: 900;
    border-radius: 16px;
}

/* 🔥 MENSAJE DE CONFIANZA */
.mensaje-final{
    margin-top:12px;
    text-align:center;
    font-size:16px;
    font-weight:bold;
    line-height:1.4;
    color:#1b5e20;
    background:#e8f5e9;
    padding:12px;
    border-radius:12px;
}
</style>
</head>

<body>
<div class="contenedor-principal">

<div class="barra">
<a href="{{ url_for('carrito') }}" class="volver">←</a>
<div class="titulo">📋 Datos de entrega</div>
</div>

<form method="POST" action="{{ url_for('finalizar_pedido') }}">
<div class="contenedor">

<div class="intro">
Completa tus datos para finalizar el pedido.
</div>

<input type="text" name="nombre" placeholder="Nombre" required>
<input type="tel" name="telefono" placeholder="Teléfono" required>

<select name="tipo_entrega" required>
<option value="domicilio">Envío a domicilio (+$40)</option>
<option value="bodega">Recoger en bodega (Gratis)</option>
</select>

<input type="text" name="direccion" placeholder="Dirección">

<textarea name="nota" placeholder="Nota"></textarea>

</div>

<div class="pie">
<button class="boton" type="submit">FINALIZAR</button>

<!-- 🔥 MENSAJE NUEVO -->
<div class="mensaje-final">
📲 El repartidor te mandará WhatsApp para coordinar la entrega<br>
💵 Pagas al recibir tu producto
</div>

</div>
</form>

</div>
</body>
</html>
