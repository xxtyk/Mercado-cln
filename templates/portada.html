<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>

<style>
    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        font-family:Arial,sans-serif;
        background:#000;
        color:white;
    }

    .pantalla-inicio{
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        padding:24px;
        text-align:center;
        background:#000;
    }

    .logo-wrap{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        margin-bottom:28px;
    }

    .logo-wrap img{
        width:320px;
        max-width:88vw;
        height:auto;
        display:block;
        object-fit:contain;
    }

    .texto{
        font-size:24px;
        color:white;
        margin-bottom:28px;
        line-height:1.5;
        max-width:520px;
    }

    .btn{
        display:inline-block;
        width:100%;
        max-width:420px;
        background:#1f49b6;
        color:white;
        text-decoration:none;
        padding:18px 22px;
        border-radius:22px;
        font-size:18px;
        font-weight:bold;
        margin-bottom:22px;
    }

    .contador{
        font-size:18px;
        color:#d9d9d9;
    }
</style>
</head>
<body>

<div class="pantalla-inicio">
    <div class="logo-wrap">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Mercado en Línea Culiacán">
    </div>

    <div class="texto">
        ¿Quieres descargar la aplicación<br>
        para hacer tu pedido más rápido?
    </div>

    <a href="javascript:void(0)" class="btn">Descargar aplicación</a>

    <div class="contador">
        Entrando a categorías en <span id="contador">5</span> segundos...
    </div>
</div>

<script>
    let segundos = 5;

    function actualizarContador() {
        const contador = document.getElementById("contador");
        if (contador) {
            contador.textContent = segundos;
        }

        if (segundos <= 0) {
            window.location.href = "{{ url_for('catalogo') }}";
            return;
        }

        segundos--;
        setTimeout(actualizarContador, 1000);
    }

    window.onload = function () {
        actualizarContador();
    };
</script>

</body>
</html>
