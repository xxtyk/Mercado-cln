<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>

<style>
    *{
        box-sizing:border-box;
    }

    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#ffffff;
    }

    .pantalla-inicio{
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        padding:24px;
        text-align:center;
        background:linear-gradient(180deg, #ffffff 0%, #f5f5f5 100%);
    }

    .logo-wrap{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        margin-bottom:24px;
    }

    .logo-wrap img{
        width:260px;
        max-width:85vw;
        height:auto;
        display:block;
        object-fit:contain;
    }

    .titulo{
        font-size:28px;
        font-weight:bold;
        color:#1976d2;
        margin-bottom:14px;
    }

    .texto{
        font-size:18px;
        color:#222;
        margin-bottom:20px;
        line-height:1.4;
    }

    .btn{
        display:inline-block;
        background:#25d366;
        color:white;
        text-decoration:none;
        padding:14px 22px;
        border-radius:12px;
        font-size:17px;
        font-weight:bold;
        margin-bottom:14px;
    }

    .btn-secundario{
        display:inline-block;
        background:#1976d2;
        color:white;
        text-decoration:none;
        padding:14px 22px;
        border-radius:12px;
        font-size:17px;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="pantalla-inicio">
    <div class="logo-wrap">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Mercado en Línea Culiacán">
    </div>

    <div class="titulo">Mercado en Línea Culiacán</div>

    <div class="texto">
        Descarga la aplicación para hacer tu pedido más rápido
    </div>

    <a href="#" class="btn">Descargar aquí la aplicación</a>

    <a href="{{ url_for('catalogo') }}" class="btn-secundario">Entrar a la tienda</a>
</div>

</body>
</html>
