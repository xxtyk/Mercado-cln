<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercado en Línea Culiacán</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    color:white;
}

/* LOGO */
.logo{
    width:160px;
    margin-bottom:20px;
    animation: zoom 1.5s ease;
}

@keyframes zoom{
    from{ transform:scale(0.5); opacity:0; }
    to{ transform:scale(1); opacity:1; }
}

/* TEXTO */
.texto{
    font-size:18px;
    margin-bottom:25px;
}

/* BOTÓN DESCARGA */
.boton{
    background:#1976d2;
    color:white;
    padding:14px 20px;
    border-radius:12px;
    text-decoration:none;
    font-size:16px;
    font-weight:bold;
    margin-bottom:20px;
}

/* CONTADOR */
.contador{
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="texto">
Descarga la aplicación para pedidos más rápidos
</div>

<a href="#" id="btnInstalar" class="boton">
📲 Descargar aplicación
</a>

<div class="contador">
Entrando en <span id="tiempo">5</span>...
</div>

<script>
let deferredPrompt;

// detectar instalación PWA
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
});

// botón instalar
document.getElementById('btnInstalar').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
    } else {
        alert("Para instalar, usa el menú del navegador (Agregar a pantalla de inicio)");
    }
});

// contador y redirección
let tiempo = 5;
const span = document.getElementById("tiempo");

const intervalo = setInterval(()=>{
    tiempo--;
    span.innerText = tiempo;

    if(tiempo <= 0){
        clearInterval(intervalo);
        window.location.href = "/catalogo";
    }
},1000);
</script>

</body>
</html>
