<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado en Línea Culiacán</title>

    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family: Arial, sans-serif;
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .pantalla{
            width:100%;
            max-width:420px;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:30px 20px;
            background:#000;
        }

        .logo{
            width:230px;
            max-width:90%;
            margin-bottom:30px;
            animation:latido 1.4s infinite;
            object-fit:contain;
        }

        .titulo-mercado{
            font-size:54px;
            font-weight:900;
            line-height:0.95;
            color:#153ea8;
            text-transform:uppercase;
            letter-spacing:1px;
            margin-bottom:10px;
        }

        .titulo-enlinea{
            font-size:28px;
            font-weight:300;
            color:#d9d9d9;
            text-transform:uppercase;
            letter-spacing:8px;
            margin-bottom:10px;
        }

        .titulo-culiacan{
            font-size:42px;
            font-weight:900;
            color:#ffffff;
            text-transform:uppercase;
            letter-spacing:1px;
            margin-bottom:28px;
        }

        .mensaje{
            font-size:22px;
            color:#ffffff;
            line-height:1.5;
            margin-bottom:28px;
            max-width:340px;
        }

        .boton{
            display:inline-block;
            background:#153ea8;
            color:#fff;
            text-decoration:none;
            padding:15px 24px;
            border-radius:14px;
            font-size:18px;
            font-weight:bold;
            box-shadow:0 4px 14px rgba(0,0,0,0.35);
        }

        @keyframes latido{
            0%{transform:scale(1);}
            50%{transform:scale(1.05);}
            100%{transform:scale(1);}
        }
    </style>
</head>
<body>

<div class="pantalla">

    <img class="logo" src="{{ url_for('static', filename='logo.png') }}" alt="Logo">

    <div class="titulo-mercado">Mercado</div>
    <div class="titulo-enlinea">En Línea</div>
    <div class="titulo-culiacan">Culiacán</div>

    <div class="mensaje">
        Descarga la aplicación para hacer tu pedido más rápido.
    </div>

    <a class="boton" href="{{ url_for('catalogo') }}">
        Entrar a la aplicación
    </a>

</div>

</body>
</html>
