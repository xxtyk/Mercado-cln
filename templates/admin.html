<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.barra{
    background:#000;
    color:#fff;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.contenedor{
    padding:10px;
}

.card{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:8px;
    margin-bottom:8px;
}

button{
    width:100%;
    padding:10px;
    background:#000;
    color:#fff;
    border:none;
    border-radius:6px;
}

.btn{
    display:inline-block;
    margin-top:10px;
    background:red;
    color:#fff;
    padding:6px 10px;
    border-radius:6px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="barra">PANEL ADMIN</div>

<div class="contenedor">

<!-- AGREGAR CATEGORIA -->
<div class="card">
<h3>Agregar Categoría</h3>
<form action="/agregar_categoria" method="POST">
<input type="text" name="nombre" placeholder="Nombre categoría" required>
<button type="submit">Guardar</button>
</form>
</div>

<!-- AGREGAR PRODUCTO -->
<div class="card">
<h3>Agregar Producto</h3>
<form action="/agregar_producto" method="POST">
<input type="text" name="nombre" placeholder="Nombre producto" required>
<input type="number" name="precio" placeholder="Precio" required>
<button type="submit">Guardar</button>
</form>
</div>

<!-- PEDIDOS -->
<div class="card">
<h3>Pedidos</h3>

{% if pedidos %}
    {% for p in pedidos %}
        <div style="border-top:1px solid #ccc; margin-top:10px; padding-top:10px;">
            <b>{{ p.nombre }}</b><br>
            {{ p.telefono }}<br>
            {{ p.direccion }}<br><br>

            {% for prod in p.productos %}
                - {{ prod.nombre }} (${{ prod.precio }})<br>
            {% endfor %}

            <a class="btn" href="/eliminar_pedido/{{ p.id }}">Eliminar</a>
        </div>
    {% endfor %}
{% else %}
    No hay pedidos aún
{% endif %}

</div>

</div>

</body>
</html>
