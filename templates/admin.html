<!DOCTYPE html>
<html>
<body>

<h1>Panel Admin</h1>

<form action="/agregar" method="POST">
<input name="nombre" placeholder="Nombre" required>
<input name="precio" placeholder="Precio" required>
<input name="imagen" placeholder="URL imagen" required>
<input name="categoria" placeholder="Categoria" required>
<button>Agregar</button>
</form>

<hr>

{% for p in productos %}
<div>
    <p>{{p.nombre}} - ${{p.precio}} ({{p.categoria}})</p>
    <img src="{{p.imagen}}" width="80">
    <a href="/eliminar/{{loop.index0}}">Eliminar</a>
</div>
{% endfor %}

</body>
</html>
