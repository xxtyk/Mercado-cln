<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Mercado CLN</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #121212; 
            color: white; 
            margin: 0; 
            padding: 15px;
            text-align: center;
        }

        h2 { color: #00d4ff; margin-bottom: 25px; font-size: 1.8rem; }

        .contenedor {
            width: 98%;
            margin: auto;
        }

        /* Formulario Macizo para el Celular */
        .formulario {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .formulario input {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            font-size: 1.2rem;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2c2c2c;
            color: white;
            box-sizing: border-box;
        }

        .guardar {
            background: #27ae60;
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.4rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Lista de Productos */
        .producto {
            background: #1e1e1e;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .producto img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .borrar {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .volver {
            display: block;
            margin-top: 30px;
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Panel de Administración</h2>

    <form class="formulario" action="/agregar" method="POST" enctype="multipart/form-data">
        <input type="text" name="nombre" placeholder="Nombre del Producto" required>
        <input type="text" name="precio" placeholder="Precio (Ej: 160)" required>
        <input type="file" name="imagen" accept="image/*" required>
        <button type="submit" class="guardar">GUARDAR PRODUCTO</button>
    </form>

    <hr style="border: 0.5px solid #333; margin: 40px 0;">

    <h3>Productos en catálogo:</h3>
    
    {% for p in productos %}
    <div class="producto">
        <img src="{{ p.imagen }}" alt="{{ p.nombre }}">
        <h3>{{ p.nombre }}</h3>
        <p style="color: #2ecc71; font-size: 1.3rem; font-weight: bold;">$ {{ p.precio }}</p>
        <a href="{{ url_for('eliminar', index=loop.index0) }}" class="borrar" onclick="return confirm('¿Borrar este producto?')">ELIMINAR</a>
    </div>
    {% else %}
    <p>No hay productos todavía.</p>
    {% endfor %}

    <a href="/" class="volver">← Volver al Catálogo</a>
</div>

</body>
</html>
