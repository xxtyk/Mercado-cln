<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel - Mercado CLN</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.header{
    background:#000;
    color:#fff;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.contenedor{
    padding:12px;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.btn{
    display:block;
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.whatsapp{
    background:#25D366;
    color:#fff;
}

.vacio{
    text-align:center;
    padding:40px;
    color:#777;
}
</style>
</head>

<body>

<div class="header">
    📦 Pedidos nuevos
</div>

<div class="contenedor">

{% if pedidos %}
    {% for p in pedidos %}
    <div class="card">

        <b>Cliente:</b> {{ p.nombre }}<br>
        <b>Tel:</b> {{ p.telefono }}<br>
        <b>Dirección:</b> {{ p.direccion }}<br><br>

        <b>Pedido:</b><br>
        <pre>{{ p.texto }}</pre>

        <form method="POST" action="/enviar_pedido/{{ p._id }}">
            <button class="btn whatsapp">
                Enviar a WhatsApp y borrar
            </button>
        </form>

    </div>
    {% endfor %}
{% else %}
    <div class="vacio">
        No hay pedidos nuevos
    </div>
{% endif %}

</div>

</body>
</html>
