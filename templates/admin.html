<!DOCTYPE html>
<html>
<head>
    <title>Admin - Mercado CLN</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; }

        .form {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }

        input, button {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
        }

        .producto {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        img { width: 100%; border-radius: 10px; }

        .borrar {
            background: red;
            color: white;
            border: none;
        }

        .guardar {
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Panel de Servicios</h2>

<!-- FORMULARIO -->
<form class="form" action="/agregar" method="POST" enctype="multipart/form-data">
    <input type="text" name="nombre" placeholder="Servicio (Ej: Mantenimiento Minisplit)" required>
    <input type="text" name="precio" placeholder="Precio" required>
    <input type="file" name="imagen" accept="image/*" required>

    <button type="submit" class="guardar">Guardar</button>
</form>

<hr>

<!-- LISTA -->
<div>
    {% for p in productos %}
    <div class="producto">
        <img src="{{ p.imagen }}">
        <h3>{{ p.nombre }}</h3>
        <p>$ {{ p.precio }}</p>

        <a href="/eliminar/{{ loop.index0 }}">
            <button class="borrar">Borrar</button>
        </a>
    </div>
    {% endfor %}
</div>

</body>
</html>
