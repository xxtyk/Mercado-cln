<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Mercado CLN</title>
<style>
body { font-family:'Segoe UI', sans-serif; background:#121212; color:white; margin:0; padding:20px; }
h2 { text-align:center; color:#00d4ff; margin-bottom:20px; }
.contenedor { width:95%; margin:auto; }
form { background:#1e1e1e; padding:20px; border-radius:15px; }
input, button { width:100%; padding:18px; margin:10px 0; font-size:1.1rem; border:none; border-radius:10px; }
input { background:#2c2c2c; color:white; border-bottom:2px solid #00d4ff; }
button.guardar { background:green; color:white; font-weight:bold; }
button.borrar { background:red; color:white; margin-top:10px; }
.producto { background:#1e1e1e; padding:15px; margin-bottom:10px; border-radius:15px; text-align:center; }
img { width:100%; border-radius:15px; }
</style>
</head>
<body>

<h2>Panel de Administración</h2>
<div class="contenedor">

<!-- FORMULARIO AGREGAR CATEGORÍA -->
<form action="/editar_categoria" method="POST">
    <input type="text" name="nombre" placeholder="Nombre de la categoría" required>
    <button type="submit" class="guardar">Agregar Categoría</button>
</form>

<!-- FORMULARIO AGREGAR PRODUCTO -->
<form action="/agregar_producto" method="POST" enctype="multipart/form-data" style="margin-top:30px;">
    <input type="text" name="nombre" placeholder="Nombre del Producto" required>
    <input type="text" name="precio" placeholder="Precio" required>
    <input type="text" name="descripcion" placeholder="Descripción" required>
    <select name="categoria" required>
        {% for c in categorias %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
    </select>
    <input type="file" name="imagen" accept="image/*" required>
    <button type="submit" class="guardar">Guardar Producto</button>
</form>

<!-- LISTA DE PRODUCTOS -->
{% for p in productos %}
<div class="producto">
    <img src="{{ p.imagen }}" alt="{{ p.nombre }}">
    <h3>{{ p.nombre }}</h3>
    <p>${{ p.precio }}</p>
    <a href="/eliminar_producto/{{ loop.index0 }}"><button class="borrar">Borrar</button></a>
</div>
{% endfor %}

</div>
</body>
</html>
