<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Mercado CLN</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .contenedor {
            width: 90%;
            max-width: 400px;
            margin: auto;
        }

        .formulario {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        .guardar {
            background: green;
            color: white;
            border: none;
        }

        .producto {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .borrar {
            background: red;
            color: white;
            border: none;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<h2>Panel de Administración</h2>

<div class="contenedor">

    <!-- FORMULARIO -->
    <form class="formulario" action="/agregar" method="POST" enctype="multipart/form-data">
        <input type="text" name="nombre" placeholder="Nombre del servicio" required>
        <input type="text" name="precio" placeholder="Precio" required>
        <input type="file" name="imagen" accept="image/*" required>

        <button type="submit" class="guardar">Guardar Servicio</button>
    </form>

    <!-- LISTA DE PRODUCTOS -->
    {% for p in productos %}
    <div class="producto">
        <img src="{{ p.imagen }}" alt="Imagen">
        <h3>{{ p.nombre }}</h3>
        <p>$ {{ p.precio }}</p>

        <a href="/eliminar/{{ loop.index0 }}">
            <button class="borrar">Borrar</button>
        </a>
    </div>
    {% endfor %}

</div>

</body>
</html>
