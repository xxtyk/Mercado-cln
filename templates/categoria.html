<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos - {{ categoria }}</title>

{% if config.logo %}
<link rel="icon" href="{{ config.logo }}" type="image/png">
<link rel="apple-touch-icon" href="{{ config.logo }}">
{% endif %}

<style>
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: #121212; 
    color: white; 
    margin: 0; 
    padding: 20px; 
    text-align: center; 
}
header { margin-bottom: 30px; }
header img { width: 120px; border-radius: 10px; margin-bottom: 10px; }
h1 { color: #00d4ff; margin-bottom: 20px; font-size: 1.8rem; }
.contenedor { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
.producto { background: #1e1e1e; width: 45%; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align:center; transition:0.3s; }
.producto:hover { transform: scale(1.03); }
.producto img { width:100%; height:180px; object-fit:cover; border-radius:10px; margin-bottom:10px; }
h3 { margin:5px 0; font-size:1.1rem; }
.precio { font-size:1.2rem; color:#2ecc71; font-weight:bold; margin:5px 0 10px 0; }
.btn-whatsapp { background-color: #25d366; color: white; border: none; padding: 10px; border-radius: 8px; cursor:pointer; text-decoration:none; font-weight:bold; display:inline-block; width:100%; transition:0.3s; }
.btn-whatsapp:hover { background-color:#128c7e; }
@media(max-width:600px){ .producto { width: 100%; } }
</style>
</head>
<body>

<header>
    {% if config.logo %}
    <img src="{{ config.logo }}" alt="Logo Mercado CLN">
    {% endif %}
    <h1>{{ categoria }}</h1>
</header>

<div class="contenedor">
    {% if productos %}
        {% for p in productos %}
        <div class="producto">
            <img src="{{ p.imagen }}" alt="{{ p.nombre }}">
            <h3>{{ p.nombre }}</h3>
            <p class="precio">${{ p.precio }}</p>
            <a href="https://wa.me/526679771409?text=Hola Hector, me interesa el servicio de: {{ p.nombre }} que vi en Mercado CLN" target="_blank" class="btn-whatsapp">
                Solicitar por WhatsApp
            </a>
        </div>
        {% endfor %}
    {% else %}
        <p>No hay productos en esta categoría todavía.</p>
    {% endif %}
</div>

</body>
</html>
