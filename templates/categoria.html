<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ categoria }} - Mercado CLN</title>
<style>
body { font-family:'Segoe UI', sans-serif; background:#121212; color:white; margin:0; padding:20px; }
h1 { text-align:center; color:#00d4ff; margin-bottom:20px; }
.contenedor { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; }
.producto { background:#1e1e1e; width:45%; border-radius:15px; overflow:hidden; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.5); }
.producto img { width:100%; height:180px; object-fit:cover; border-bottom:2px solid #00d4ff; }
h3 { margin:10px 0 5px 0; }
.precio { font-weight:bold; color:#2ecc71; margin-bottom:10px; }
.btn-whatsapp { display:block; margin:10px auto 15px auto; background:#25d366; color:white; padding:10px; border:none; border-radius:8px; text-decoration:none; font-weight:bold; transition:0.3s; }
.btn-whatsapp:hover { background:#128c7e; }
.vacio { padding:50px; color:#888; text-align:center; }
@media(max-width:600px){ .producto{width:90%;} }
</style>
</head>
<body>

<h1>{{ categoria }}</h1>
<div class="contenedor">
{% for p in productos %}
<div class="producto">
    <img src="{{ p.imagen }}" alt="{{ p.nombre }}">
    <h3>{{ p.nombre }}</h3>
    <p class="precio">${{ p.precio }}</p>
    <a href="https://wa.me/526679771409?text=Hola Hector, me interesa el servicio de {{ p.nombre }} que vi en Mercado CLN" target="_blank" class="btn-whatsapp">
        Solicitar por WhatsApp
    </a>
</div>
{% else %}
<div class="vacio">
    <p>No hay productos en esta categoría. Ve al panel de admin para agregarlos.</p>
</div>
{% endfor %}
</div>

</body>
</html>
