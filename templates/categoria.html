<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar categoría</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
            margin: 0;
        }
        .box {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        h1 {
            margin-top: 0;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            box-sizing: border-box;
        }
        button {
            background: #000;
            color: #fff;
            border: 0;
            border-radius: 8px;
        }
        a {
            display: inline-block;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Agregar categoría</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <p>{{ msg }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('editar_categoria') }}" method="POST" enctype="multipart/form-data">
            <input type="text" name="nombre_categoria" placeholder="Nombre de la categoría" required>
            <input type="file" name="foto_categoria" accept="image/*">
            <button type="submit">Guardar categoría</button>
        </form>

        <a href="{{ url_for('admin') }}">Volver al panel</a>
    </div>
</body>
</html>
