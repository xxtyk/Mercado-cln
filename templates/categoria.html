<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ categoria.nombre }}</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:#000;
    padding:12px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:10;
}

.header a{
    position:absolute;
    left:10px;
    top:12px;
    color:white;
    text-decoration:none;
    font-size:22px;
}

.header h1{
    color:#fff;
    margin:0;
    font-size:18px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.nombre{
    font-size:14px;
    font-weight:bold;
}

.precio{
    color:#2e7d32;
    font-weight:bold;
    margin-top:4px;
}

/* BOTÓN */
form{
    margin-top:8px;
}

button{
    width:100%;
    padding:8px;
    border:none;
    background:#000;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

input{
    width:100%;
    padding:6px;
    margin-top:6px;
    border-radius:6px;
    border:1px solid #ccc;
}
</style>
</head>
<body>

<div class="header">
    <a href="{{ url_for('inicio') }}">←</a>
    <h1>{{ categoria.nombre }}</h1>
</div>

<div class="grid">
{% for p in productos %}
    <div class="card">

        {% if p.foto %}
            <img src="{{ url_for('static', filename=p.foto) }}">
        {% endif %}

        <div class="info">
            <div class="nombre">{{ p.nombre }}</div>
            <div class="precio">${{ "%.2f"|format(p.precio|float) }}</div>

            <form action="{{ url_for('agregar_al_carrito', producto_id=p.id) }}" method="POST">
                
                <input type="number" name="cantidad" value="1" min="1">

                <input type="text" name="descripcion" placeholder="Nota (opcional)">

                <button type="submit">Agregar</button>
            </form>

        </div>
    </div>
{% endfor %}
</div>

</body>
</html>
