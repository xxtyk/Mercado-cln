<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ categoria.nombre if categoria else 'Categoría' }}</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:#000;
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,0.25);
}

.header-izq{
    display:flex;
    align-items:center;
    gap:12px;
}

.header a.volver{
    color:white;
    text-decoration:none;
    font-size:24px;
    line-height:1;
}

.header h1{
    color:#fff;
    margin:0;
    font-size:18px;
}

/* BOTÓN SIGUIENTE */
.btn-siguiente{
    background:#1976d2;
    color:white;
    text-decoration:none;
    padding:9px 12px;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
    white-space:nowrap;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:10px;
    padding:10px;
    padding-bottom:110px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    display:block;
    background:#e0e0e0;
}

.info{
    padding:10px;
}

.nombre{
    font-size:14px;
    font-weight:bold;
    min-height:36px;
}

.precio{
    color:#2e7d32;
    font-weight:bold;
    margin-top:4px;
    font-size:16px;
}

/* FORM AGREGAR */
.form-agregar{
    margin-top:10px;
}

.cantidad-box{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-bottom:8px;
}

.cantidad-btn{
    width:34px;
    height:34px;
    border:none;
    background:#1976d2;
    color:white;
    border-radius:8px;
    font-size:20px;
    cursor:pointer;
}
