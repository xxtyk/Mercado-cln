<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Categoría</title>
<style>
body { font-family:'Segoe UI', sans-serif; background:#121212; color:white; margin:0; padding:0; }
.container { padding:20px; width:95%; margin:auto; }
input { width:100%; padding:15px; margin:10px 0; background:#1e1e1e; color:white; border:none; border-bottom:2px solid #00d4ff; border-radius:5px; }
button { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); background:#00d4ff; color:black; padding:15px 50px; border:none; border-radius:10px; font-weight:bold; font-size:1.1rem; cursor:pointer; }
button:hover { background:#00b3cc; }
</style>
</head>
<body>
<div class="container">
<form action="/editar_categoria" method="POST">
<input type="text" name="nombre" placeholder="Nombre de la categoría" required>
<button type="submit">GUARDAR</button>
</form>
</div>
</body>
</html>
