<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ categoria }}</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#121212; color:white; margin:0; padding:20px; text-align:center; }
h1 { color:#00d4ff; margin-bottom:20px; }
.contenedor { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; }
.producto { background:#1e1e1e; width:45%; border-radius:15px; padding:10px; box-shadow:0 4px 15px rgba(0,0,0,0.5); }
.producto img { width:100%; border-radius:15px; }
.precio { color:#2ecc71; font-weight:bold; margin:10px 0; }
.btn-whatsapp { background:#25d366; color:white; border:none; padding:10px; border-radius:8px; display:block; margin:10px auto 0; text-decoration:none; font-weight:bold; }
.btn-whatsapp:hover { background:#128c7e; }
</style>
</head>
<body>
<h1>{{ categoria }}</h1>
<div class="contenedor">
{% for p in productos %}
<div class="producto">
<img src="{{ p.imagen }}" alt="{{ p.nombre }}">
<h3>{{ p.nombre }}</h3>
<p class="precio">${{ p.precio }}</p>
<a href="https://wa.me/526679771409?text=Hola Hector, me interesa el producto: {{ p.nombre }}" target="_blank" class="btn-whatsapp">Solicitar por WhatsApp</a>
</div>
{% else %}
<p>No hay productos en esta categoría.</p>
{% endfor %}
</div>
</body>
</html>
