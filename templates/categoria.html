<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ categoria.nombre }}</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #efefef;
        }

        .barra-superior {
            background: #1f1f1f;
            color: white;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
        }

        .flecha {
            font-size: 34px;
            text-decoration: none;
            color: white;
        }

        .titulo {
            font-size: 24px;
            color: #bdbdbd;
            text-transform: uppercase;
        }

        .contenedor {
            padding: 12px;
            padding-bottom: 90px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            display: flex;
            flex-direction: column;
        }

        .foto-producto {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .sin-foto {
            height: 150px;
            background: #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nombre {
            font-size: 16px;
            font-weight: bold;
        }

        .precio {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .descripcion {
            font-size: 13px;
            margin-bottom: 10px;
        }

        .fila-agregar {
            display: flex;
            gap: 6px;
        }

        .cantidad {
            width: 55px;
        }

        .btn-agregar {
            flex: 1;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
        }

        .barra-carrito {
            position: fixed;
            right: 14px;
            bottom: 14px;
        }

        .btn-ver-carrito {
            background: #1f1f1f;
            color: white;
            padding: 14px;
            border-radius: 999px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="barra-superior">
    <a href="{{ url_for('index') }}" class="flecha">←</a>
    <div class="titulo">{{ categoria.nombre }}</div>
</div>

{% if productos %}
<div class="contenedor">
    {% for p in productos %}
    <div class="card">

        {% if p.foto %}
            <img src="{{ url_for('static', filename=p.foto) }}" class="foto-producto">
        {% else %}
            <div class="sin-foto">Sin foto</div>
        {% endif %}

        <div class="nombre">{{ p.nombre }}</div>
        <div class="precio">${{ p.precio }}</div>
        <div class="descripcion">{{ p.descripcion }}</div>

        <!-- 🔥 FORMULARIO ARREGLADO -->
        <form method="POST" action="{{ url_for('agregar_carrito') }}">
            <input type="hidden" name="producto_id" value="{{ p.id }}">

            <div class="fila-agregar">
                <input class="cantidad" type="number" name="cantidad" value="1" min="1">
                <input type="text" name="descripcion" placeholder="Detalle">
                <button type="submit" class="btn-agregar">Agregar</button>
            </div>
        </form>

    </div>
    {% endfor %}
</div>
{% else %}
<p>No hay productos</p>
{% endif %}

<div class="barra-carrito">
    <a href="{{ url_for('carrito') }}" class="btn-ver-carrito">Ver carrito</a>
</div>

</body>
</html>
