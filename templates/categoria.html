<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ categoria.nombre if categoria else 'Categoría' }}</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:#000;
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,0.25);
}

.header-izq{
    display:flex;
    align-items:center;
    gap:12px;
}

.header a.volver{
    color:white;
    text-decoration:none;
    font-size:24px;
}

.header h1{
    color:#fff;
    margin:0;
    font-size:18px;
}

.btn-siguiente{
    background:#1976d2;
    color:white;
    text-decoration:none;
    padding:9px 12px;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:10px;
    padding:10px;
    padding-bottom:110px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.nombre{
    font-size:14px;
    font-weight:bold;
}

.precio{
    color:#2e7d32;
    font-weight:bold;
    font-size:16px;
}

/* FORM */
.cantidad-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin:10px 0;
}

.cantidad-btn{
    width:36px;
    height:36px;
    border:none;
    background:#1976d2;
    color:white;
    border-radius:8px;
    font-size:20px;
}

.cantidad-input{
    width:55px;
    height:36px;
    text-align:center;
    border:1px solid #ccc;
    border-radius:8px;
}

/* BOTÓN */
.btn-agregar{
    width:100%;
    padding:10px;
    border:none;
    background:#000;
    color:white;
    border-radius:8px;
    font-weight:bold;
}

/* CARRITO */
.carrito-fijo{
    position:fixed;
    left:10px;
    right:10px;
    bottom:12px;
    background:#1976d2;
    color:white;
    text-decoration:none;
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-izq">
        <a href="{{ url_for('inicio') }}" class="volver">←</a>
        <h1>{{ categoria.nombre }}</h1>
    </div>

    <a href="{{ url_for('ver_carrito') }}" class="btn-siguiente">Carrito</a>
</div>

<div class="grid">
{% for p in productos %}
<div class="card">

    <img src="{{ resolver_imagen(p.foto) if p.foto else url_for('static', filename='logo.png') }}">

    <div class="info">
        <div class="nombre">{{ p.nombre }}</div>
        <div class="precio">${{ p.precio|int }}</div>

        <form action="{{ url_for('agregar_al_carrito', producto_id=p.id) }}" method="POST">

            <div class="cantidad-box">
                <button type="button" onclick="cambiarCantidad('c{{p.id}}', -1)">-</button>

                <input id="c{{p.id}}" type="number" name="cantidad" value="1" min="0">

                <button type="button" onclick="cambiarCantidad('c{{p.id}}', 1)">+</button>
            </div>

            <button type="submit" class="btn-agregar">Agregar</button>

        </form>
    </div>
</div>
{% endfor %}
</div>

{% if carrito_cantidad_total > 0 %}
<a href="{{ url_for('ver_carrito') }}" class="carrito-fijo">
<span>🛒 Siguiente ({{ carrito_cantidad_total }})</span>
<span>${{ carrito_importe_total|int }}</span>
</a>
{% endif %}

<script>
function cambiarCantidad(id, cambio){
    const input = document.getElementById(id);
    let valor = parseInt(input.value) || 0;

    valor += cambio;

    if (valor < 0) valor = 0;

    input.value = valor;
}
</script>

</body>
</html>
