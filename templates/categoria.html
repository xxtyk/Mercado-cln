<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ categoria.nombre }}</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:#000;
    padding:12px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:10;
}
.header img{
    height:60px;
}

/* GRID PRODUCTOS */
.grid{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

/* CONTENIDO */
.content{
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.nombre{
    font-size:13px;
    font-weight:bold;
}

.descripcion{
    font-size:12px;
    color:#666;
}

.precio{
    font-size:16px;
    font-weight:bold;
    color:#1976d2;
}

/* BOTON */
.btn{
    margin-top:auto;
    background:#1976d2;
    color:white;
    border:none;
    padding:8px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

/* CARRITO FLOAT */
.carrito-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#1976d2;
    color:white;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='logo.jpg') }}">
</div>

<div class="grid">

{% for producto in productos %}

<div class="card">

    <img src="{{ url_for('static', filename='uploads/' + producto.imagen) }}">

    <div class="content">

        <div class="nombre">{{ producto.nombre }}</div>
        <div class="descripcion">{{ producto.descripcion }}</div>

        <div class="precio">${{ producto.precio }}</div>

        <form action="/agregar_carrito" method="POST">
            <input type="hidden" name="id" value="{{ producto.id }}">
            <button class="btn">Agregar</button>
        </form>

    </div>

</div>

{% endfor %}

</div>

<div class="carrito-btn">
🛒
</div>

</body>
</html>
