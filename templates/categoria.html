<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ categoria.nombre if categoria else 'Categoría' }}</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:#000;
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,0.25);
}

.header-izq{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
}

.header a.volver{
    color:white;
    text-decoration:none;
    font-size:24px;
    line-height:1;
}

.header h1{
    color:#fff;
    margin:0;
    font-size:18px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.btn-siguiente{
    background:#1976d2;
    color:white;
    text-decoration:none;
    padding:9px 12px;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
    white-space:nowrap;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    padding:10px;
    padding-bottom:110px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
}

.link-producto{
    text-decoration:none;
    color:inherit;
    display:block;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    display:block;
    background:#ececec;
}

.info{
    padding:10px;
}

.nombre{
    font-size:14px;
    font-weight:bold;
    line-height:1.3;
    min-height:36px;
    margin-bottom:6px;
    color:#111;
}

.precio{
    color:#2e7d32;
    font-weight:bold;
    font-size:16px;
    margin-bottom:8px;
}

/* FORM */
.cantidad-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin:10px 0;
}

.cantidad-btn{
    width:36px;
    height:36px;
    border:none;
    background:#1976d2;
    color:white;
    border-radius:8px;
    font-size:20px;
    font-weight:bold;
}

.cantidad-input{
    width:55px;
    height:36px;
    text-align:center;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.cantidad-input::-webkit-outer-spin-button,
.cantidad-input::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
}

/* BOTÓN */
.btn-agregar{
    width:100%;
    padding:10px;
    border:none;
    background:#000;
    color:white;
    border-radius:8px;
    font-weight:bold;
    font-size:14px;
}

/* CARRITO */
.carrito-fijo{
    position:fixed;
    left:10px;
    right:10px;
    bottom:12px;
    background:#1976d2;
    color:white;
    text-decoration:none;
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    box-shadow:0 4px 14px rgba(0,0,0,0.18);
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-izq">
        <a href="{{ url_for('inicio') }}" class="volver">←</a>
        <h1>{{ categoria.nombre }}</h1>
    </div>

    <a href="{{ url_for('ver_carrito') }}" class="btn-siguiente">Carrito</a>
</div>

<div class="grid">
{% for p in productos %}
<div class="card">

    <a href="{{ url_for('producto', id=p.id) }}" class="link-producto">
        <img src="{{ resolver_imagen(p.foto) if p.foto else url_for('static', filename='logo.png') }}" alt="{{ p.nombre }}">
    </a>

    <div class="info">
        <a href="{{ url_for('producto', id=p.id) }}" class="link-producto">
            <div class="nombre">{{ p.nombre }}</div>
        </a>

        <div class="precio">${{ '%.2f'|format(p.precio or 0) }}</div>

        <form action="{{ url_for('agregar_al_carrito', id=p.id) }}" method="POST" onsubmit="return validarCantidad('c{{ p.id }}')">
            <div class="cantidad-box">
                <button type="button" class="cantidad-btn" onclick="cambiarCantidad('c{{ p.id }}', -1)">-</button>

                <input id="c{{ p.id }}" class="cantidad-input" type="number" name="cantidad" value="1" min="0">

                <button type="button" class="cantidad-btn" onclick="cambiarCantidad('c{{ p.id }}', 1)">+</button>
            </div>

            <button type="submit" class="btn-agregar">Agregar</button>
        </form>
    </div>
</div>
{% endfor %}
</div>

{% if carrito_cantidad_total > 0 %}
<a href="{{ url_for('ver_carrito') }}" class="carrito-fijo">
    🛒 Siguiente ({{ carrito_cantidad_total }})
</a>
{% endif %}

<script>
function cambiarCantidad(id, cambio){
    const input = document.getElementById(id);
    let valor = parseInt(input.value) || 0;

    valor += cambio;

    if (valor < 0){
        valor = 0;
    }

    input.value = valor;
}

function validarCantidad(id){
    const input = document.getElementById(id);
    let valor = parseInt(input.value) || 0;

    if (valor <= 0){
        alert("Selecciona mínimo 1 pieza para agregar.");
        return false;
    }

    return true;
}
</script>

</body>
</html>
