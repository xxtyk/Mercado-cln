<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ nombre_categoria }}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #efefef;
        }

        .barra-superior {
            background: #1f1f1f;
            color: white;
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .flecha {
            font-size: 34px;
            text-decoration: none;
            color: white;
            line-height: 1;
        }

        .titulo {
            font-size: 24px;
            color: #bdbdbd;
            font-weight: 500;
        }

        .grid {
            padding: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .sin-imagen {
            width: 100%;
            height: 180px;
            background: #d9d9d9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .info {
            padding: 10px;
        }

        .nombre {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .precio {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .cantidad {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
        }

        .boton {
            width: 100%;
            padding: 10px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="barra-superior">
    <a href="{{ url_for('index') }}" class="flecha">←</a>
    <div class="titulo">{{ nombre_categoria }}</div>
</div>

<div class="grid">
    {% for p in productos %}
    <div class="card">
        {% if p.foto %}
            <img src="/static/{{ p.foto }}" alt="{{ p.nombre }}">
        {% else %}
            <div class="sin-imagen">Sin imagen</div>
        {% endif %}

        <div class="info">
            <div class="nombre">{{ p.nombre }}</div>
            <div class="precio">${{ p.precio }}</div>

            <form action="/agregar_carrito" method="POST">
                <input type="hidden" name="producto" value="{{ p.nombre }}">
                <input type="hidden" name="precio" value="{{ p.precio }}">
                <input type="hidden" name="foto" value="{{ p.foto }}">

                <input class="cantidad" type="number" name="cantidad" value="1" min="1">

                <button class="boton" type="submit">Agregar</button>
            </form>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
