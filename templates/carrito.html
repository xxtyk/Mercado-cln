<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.header{
    background:#1976d2;
    color:white;
    padding:16px;
    font-size:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.header a{
    color:white;
    text-decoration:none;
    font-size:24px;
}

.container{
    padding:10px;
}

.card{
    background:white;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

.card img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

.info{
    flex:1;
}

.nombre{
    font-weight:bold;
}

.precio{
    color:#1976d2;
    margin-top:4px;
}

.botones{
    display:flex;
    gap:6px;
    margin-top:6px;
}

.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.azul{ background:#1976d2; }
.rojo{ background:#d32f2f; }

.resumen{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.total{
    font-size:22px;
    font-weight:bold;
}

.btn-final{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.verde{ background:#2ecc71; color:white; }
.gris{ background:#ccc; }
</style>
</head>
<body>

<div class="header">
    <a href="javascript:history.back()">←</a>
    Carrito
</div>

<div class="container">

{% for item in carrito %}
<div class="card">
    {% if item.foto %}
        <img src="{{ resolver_imagen(item.foto) }}" alt="{{ item.nombre }}">
    {% endif %}

    <div class="info">
        <div class="nombre">{{ item.nombre }}</div>
        <div class="precio">${{ item.precio|int }}</div>
        <div>Cantidad: {{ item.cantidad }}</div>

        <div class="botones">
            <form action="{{ url_for('actualizar_carrito', indice=loop.index0) }}" method="POST">
                <input type="hidden" name="accion" value="restar">
                <button class="btn azul" type="submit">-</button>
            </form>

            <form action="{{ url_for('actualizar_carrito', indice=loop.index0) }}" method="POST">
                <input type="hidden" name="accion" value="sumar">
                <button class="btn azul" type="submit">+</button>
            </form>

            <form action="{{ url_for('actualizar_carrito', indice=loop.index0) }}" method="POST">
                <input type="hidden" name="accion" value="eliminar">
                <button class="btn rojo" type="submit">Eliminar</button>
            </form>
        </div>
    </div>
</div>
{% endfor %}

<div class="resumen">
    <div>Subtotal: ${{ subtotal|int }}</div>
    <div class="total">Total: ${{ total|int }}</div>

    <a href="{{ url_for('datos_entrega') }}">
        <button class="btn-final verde" type="button">Continuar pedido</button>
    </a>

    <form action="{{ url_for('vaciar_carrito') }}" method="POST">
        <button class="btn-final gris" type="submit">Vaciar carrito</button>
    </form>
</div>

</div>

</body>
</html>
