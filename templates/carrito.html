<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #efefef;
        }

        .barra {
            background: #1f1f1f;
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
        }

        .barra a {
            color: white;
            font-size: 28px;
            text-decoration: none;
            margin-right: 10px;
        }

        .contenedor {
            padding: 12px;
            padding-bottom: 120px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .foto {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
        }

        .info {
            flex: 1;
        }

        .nombre {
            font-weight: bold;
        }

        .precio {
            margin-bottom: 8px;
        }

        .fila {
            display: flex;
            gap: 6px;
        }

        input {
            width: 60px;
        }

        .btn {
            background: #333;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .eliminar {
            background: red;
        }

        .barra-inferior {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 12px;
        }

        .total {
            font-size: 20px;
            text-align: right;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="barra">
    <a href="{{ url_for('index') }}">←</a>
    <div>CARRITO</div>
</div>

<form method="POST" action="{{ url_for('actualizar_carrito') }}">
<div class="contenedor">

{% for item in carrito %}
<div class="card">

    {% if item.foto %}
        <img src="{{ url_for('static', filename=item.foto) }}" class="foto">
    {% endif %}

    <div class="info">
        <div class="nombre">{{ item.nombre }}</div>
        <div class="precio">$ {{ item.precio }}</div>

        <div class="fila">
            <input type="number" name="cantidad_{{ loop.index0 }}" value="{{ item.cantidad }}" min="1">
            <input type="text" name="descripcion_{{ loop.index0 }}" value="{{ item.descripcion }}">
        </div>

        <p>Subtotal: ${{ item.subtotal }}</p>
    </div>

    <form method="POST" action="{{ url_for('eliminar_del_carrito', indice=loop.index0) }}">
        <button class="btn eliminar">X</button>
    </form>

</div>
{% endfor %}

</div>

<div class="barra-inferior">
    <div class="total">Total: ${{ total }}</div>

    <button class="btn" type="submit">Actualizar</button>
</form>

<form method="POST" action="{{ url_for('vaciar_carrito') }}">
    <button class="btn eliminar">Vaciar</button>
</form>

</div>

</body>
</html>
