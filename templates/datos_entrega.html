<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos de entrega</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

.barra{
  background:#1976d2;
  color:white;
  padding:16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.volver{
  color:white;
  text-decoration:none;
  font-size:26px;
}

.contenido{
  padding:14px;
}

.bloque{
  background:white;
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.btn{
  width:100%;
  padding:14px;
  background:#25d366;
  color:white;
  border:none;
  border-radius:12px;
  font-size:17px;
  font-weight:bold;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.total{
  font-weight:bold;
  font-size:18px;
}

.oculto{
  display:none;
}
</style>
</head>
<body>

<div class="barra">
  <a href="/carrito.html" class="volver">←</a>
  <div>Finalizar pedido</div>
</div>

<div class="contenido">

  <div class="bloque">
    <h3>Tu pedido</h3>
    <div id="lista"></div>
  </div>

  <div class="bloque">
    <h3>Datos</h3>

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">

    <select id="tipo">
      <option value="domicilio">Envío a domicilio</option>
      <option value="bodega">Recoger en bodega</option>
    </select>

    <div id="domicilio">
      <input id="direccion" placeholder="Dirección">
      <input id="colonia" placeholder="Colonia">
    </div>

    <textarea id="nota" placeholder="Nota"></textarea>

    <select id="vendedor">
      <option>Mercado en Línea Culiacán</option>
      <option>Hector</option>
      <option>Silvia</option>
      <option>Juan</option>
      <option>Cristian</option>
      <option>Amayrani</option>
      <option>Brisa</option>
      <option>Claudia</option>
      <option>Natalia</option>
    </select>
  </div>

  <div class="bloque">
    <h3>Resumen</h3>

    <div class="item">
      <span>Subtotal</span>
      <span id="subtotal">$0</span>
    </div>

    <div class="item">
      <span>Envío</span>
      <span id="envio">$40</span>
    </div>

    <div class="item total">
      <span>Total</span>
      <span id="total">$0</span>
    </div>

    <button class="btn" onclick="finalizar()">Finalizar pedido</button>
  </div>

</div>

<script>
const COSTO_ENVIO = 40;

function getCarrito(){
  return JSON.parse(localStorage.getItem("carrito") || "[]");
}

function render(){
  const carrito = getCarrito();
  const lista = document.getElementById("lista");

  let subtotal = 0;
  lista.innerHTML = "";

  carrito.forEach(p=>{
    const total = p.precio * p.cantidad;
    subtotal += total;

    lista.innerHTML += `
      <div class="item">
        <span>${p.cantidad} x ${p.nombre}</span>
        <span>$${total}</span>
      </div>
    `;
  });

  document.getElementById("subtotal").innerText = "$" + subtotal;

  actualizarTotal(subtotal);
}

function actualizarTotal(subtotal){
  const tipo = document.getElementById("tipo").value;
  let envio = tipo === "domicilio" ? COSTO_ENVIO : 0;

  document.getElementById("envio").innerText = "$" + envio;
  document.getElementById("total").innerText = "$" + (subtotal + envio);
}

document.getElementById("tipo").addEventListener("change", ()=>{
  render();
  const tipo = document.getElementById("tipo").value;

  if(tipo === "domicilio"){
    document.getElementById("domicilio").classList.remove("oculto");
  }else{
    document.getElementById("domicilio").classList.add("oculto");
  }
});

function finalizar(){
  const carrito = getCarrito();

  if(!carrito.length){
    alert("Carrito vacío");
    return;
  }

  alert("Pedido enviado (simulado)");

  localStorage.removeItem("carrito");
  window.location.href = "/";
}

render();
</script>

</body>
</html>
