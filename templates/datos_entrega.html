<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos de entrega</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

.barra{
  background:#1976d2;
  color:white;
  padding:16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.volver{
  color:white;
  text-decoration:none;
  font-size:26px;
}

.contenido{
  padding:14px;
}

.bloque{
  background:white;
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

.btn{
  width:100%;
  padding:14px;
  background:#25d366;
  color:white;
  border:none;
  border-radius:12px;
  font-size:17px;
  font-weight:bold;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.total{
  font-weight:bold;
  font-size:18px;
}

.oculto{
  display:none;
}

.aviso{
  background:#000;
  color:#fff;
  padding:12px;
  border-radius:12px;
  font-size:17px;
  font-weight:bold;
  text-align:center;
  margin-bottom:12px;
}

.error{
  color:red;
  font-weight:bold;
  display:none;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="barra">
  <a href="/carrito.html" class="volver">←</a>
  <div>Finalizar pedido</div>
</div>

<div class="contenido">

  <div class="aviso">
    💵 Pagas al recibir · 🚚 Entrega el mismo día
  </div>

  <div class="bloque">
    <h3>Tu pedido</h3>
    <div id="lista"></div>
  </div>

  <div class="bloque">
    <h3>Datos</h3>

    <input id="nombre" placeholder="Nombre">
    <input id="telefono" placeholder="Teléfono">

    <select id="tipo">
      <option value="">Selecciona tipo de entrega</option>
      <option value="domicilio">Envío a domicilio (+$40)</option>
      <option value="bodega">Recoger en bodega (Gratis)</option>
    </select>

    <div id="errorTipo" class="error">
      Debes elegir envío a domicilio o recoger en bodega.
    </div>

    <div id="domicilio" class="oculto">
      <input id="direccion" placeholder="Dirección">
      <input id="colonia" placeholder="Colonia">
    </div>

    <textarea id="nota" placeholder="Nota"></textarea>

    <select id="vendedor">
      <option>Mercado en Línea Culiacán</option>
      <option>Hector</option>
      <option>Silvia</option>
      <option>Juan</option>
      <option>Cristian</option>
      <option>Amayrani</option>
      <option>Brisa</option>
      <option>Claudia</option>
      <option>Natalia</option>
    </select>
  </div>

  <div class="bloque">
    <h3>Resumen</h3>

    <div class="item">
      <span>Subtotal</span>
      <span id="subtotal">$0</span>
    </div>

    <div class="item">
      <span>Envío</span>
      <span id="envio">$0</span>
    </div>

    <div class="item total">
      <span>Total</span>
      <span id="total">$0</span>
    </div>

    <button class="btn" onclick="finalizar()">Finalizar pedido</button>
  </div>

</div>

<script>
const COSTO_ENVIO = 40;

function getCarrito(){
  return JSON.parse(localStorage.getItem("carrito") || "[]");
}

function dinero(valor){
  return "$" + Number(valor || 0).toFixed(2);
}

function calcularSubtotal(){
  const carrito = getCarrito();
  let subtotal = 0;

  carrito.forEach(p=>{
    subtotal += Number(p.precio || 0) * Number(p.cantidad || 0);
  });

  return subtotal;
}

function render(){
  const carrito = getCarrito();
  const lista = document.getElementById("lista");

  let subtotal = 0;
  lista.innerHTML = "";

  carrito.forEach(p=>{
    const total = Number(p.precio || 0) * Number(p.cantidad || 0);
    subtotal += total;

    lista.innerHTML += `
      <div class="item">
        <span>${p.cantidad} x ${p.nombre}</span>
        <span>${dinero(total)}</span>
      </div>
    `;
  });

  document.getElementById("subtotal").innerText = dinero(subtotal);
  actualizarTotal();
}

function actualizarTotal(){
  const subtotal = calcularSubtotal();
  const tipo = document.getElementById("tipo").value;
  const envio = tipo === "domicilio" ? COSTO_ENVIO : 0;

  document.getElementById("envio").innerText = dinero(envio);
  document.getElementById("total").innerText = dinero(subtotal + envio);
}

document.getElementById("tipo").addEventListener("change", ()=>{
  const tipo = document.getElementById("tipo").value;
  document.getElementById("errorTipo").style.display = "none";

  if(tipo === "domicilio"){
    document.getElementById("domicilio").classList.remove("oculto");
  }else{
    document.getElementById("domicilio").classList.add("oculto");
  }

  actualizarTotal();
});

function finalizar(){
  const carrito = getCarrito();

  if(!carrito.length){
    alert("Carrito vacío");
    return;
  }

  const nombre = document.getElementById("nombre").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const tipo = document.getElementById("tipo").value;
  const direccion = document.getElementById("direccion").value.trim();
  const colonia = document.getElementById("colonia").value.trim();

  if(!nombre){
    alert("Escribe tu nombre.");
    return;
  }

  if(!telefono){
    alert("Escribe tu teléfono.");
    return;
  }

  if(!tipo){
    document.getElementById("errorTipo").style.display = "block";
    alert("Debes elegir envío a domicilio o recoger en bodega.");
    return;
  }

  if(tipo === "domicilio" && (!direccion || !colonia)){
    alert("Para envío a domicilio escribe dirección y colonia.");
    return;
  }

  alert("Pedido recibido. El repartidor te mandará WhatsApp para ponerse de acuerdo sobre la entrega.");

  localStorage.removeItem("carrito");
  window.location.href = "/";
}

render();
</script>

</body>
</html>
