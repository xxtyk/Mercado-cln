from flask import Flask, request, redirect, url_for
import os

app = Flask(__name__)

# Configuración básica
productos = []

@app.route('/')
def inicio():
    lista_html = ""
    for p in productos:
        lista_html += f"""
        <div style='border:2px solid #000; padding:20px; margin:15px; background:white; border-radius:15px; font-size:25px;'>
            <b>{p['nombre']}</b><br>
            <span style='color:green; font-weight:bold;'>${p['precio']}</span>
        </div>"""

    return f'''
    <body style="margin:0; background:#f4f4f4; font-family:Arial; text-align:center;">
        <div style="padding:20px;">
            <h1 style="font-size:40px;">Mercado en Línea CLN</h1>
            <a href="/admin" style="display:block; margin:20px auto; padding:25px; background:red; color:white; font-size:30px; font-weight:bold; text-decoration:none; border-radius:20px; width:80%;">ENTRAR AL PANEL</a>
            <div style="margin-top:30px;">
                <h3 style="font-size:35px;">Catálogo</h3>
                {lista_html if lista_html else "<p style='font-size:25px;'>No hay productos</p>"}
            </div>
        </div>
    </body>
    '''

@app.route('/admin', methods=['GET', 'POST'])
def admin():
    if request.method == 'POST':
        nombre = request.form.get('nombre')
        precio = request.form.get('precio')
        if nombre and precio:
            productos.append({'nombre': nombre, 'precio': precio})
            return redirect(url_for('inicio'))

    return '''
    <body style="font-family: Arial; background: #eef2f3; padding: 10px;">
        <div style="background: white; padding: 30px; border-radius: 20px; max-width: 500px; margin: 20px auto; border: 1px solid #ccc;">
            <h2 style="font-size:35px; margin-bottom:30px;">Nuevo Producto</h2>
            <form method="POST" enctype="multipart/form-data">
                <label style="font-size:25px; font-weight:bold; display:block; text-align:left;">Nombre:</label>
                <input type="text" name="nombre" required style="width:100%; padding:20px; font-size:25px; margin-bottom:25px; border-radius:10px; border:2px solid #aaa;">

                <label style="font-size:25px; font-weight:bold; display:block; text-align:left;">Precio ($):</label>
                <input type="number" name="precio" required style="width:100%; padding:20px; font-size:25px; margin-bottom:25px; border-radius:10px; border:2px solid #aaa;">

                <label style="font-size:25px; font-weight:bold; display:block; text-align:left;">Foto:</label>
                <input type="file" name="foto" style="width:100%; padding:15px; font-size:20px; margin-bottom:35px;">

                <button type="submit" style="background:#27ae60; color:white; border:none; padding:25px; border-radius:15px; width:100%; font-size:30px; font-weight:bold; cursor:pointer;">SUBIR PRODUCTO</button>
            </form>
            <br>
            <a href="/" style="display:block; margin-top:30px; color:purple; font-size:25px; font-weight:bold; text-decoration:none;">← VOLVER</a>
        </div>
    </body>
    '''

if __name__ == "__main__":
    app.run(host='0.0.0.0', port=8080)
