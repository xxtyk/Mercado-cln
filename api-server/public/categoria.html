<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoría</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#111;
  padding-bottom:90px;
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#000;
  color:#fff;
  padding:14px 12px;
  display:flex;
  align-items:center;
}

.volver{
  color:#fff;
  text-decoration:none;
  font-size:24px;
}

.brand{
  flex:1;
  text-align:center;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
}

.card-img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:8px;
}

.nombre{
  font-weight:bold;
}

.precio{
  font-size:18px;
  font-weight:bold;
}

.desc{
  display:none;
  font-size:13px;
  margin-top:5px;
}

.cantidad{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:10px;
}

.cantidad button{
  width:35px;
  height:35px;
  font-size:20px;
}

.carrito{
  position:fixed;
  bottom:80px;
  right:15px;
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:50px;
  text-decoration:none;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:grid;
  grid-template-columns:repeat(4,1fr);
}

.bottom a{
  text-align:center;
  padding:10px;
  text-decoration:none;
  color:#000;
}
</style>
</head>

<body>

<div class="topbar">
<a class="volver" href="/">←</a>
<div class="brand">Categoría</div>
</div>

<div class="grid" id="productos"></div>

<a href="/carrito.html" class="carrito" id="btnCarrito">🛒 (0)</a>

<div class="bottom">
<a href="/">Inicio</a>
<a href="/pedidos.html">Pedidos</a>
<a href="/publicidad.html">Publicidad</a>
<a href="/admin.html">Admin</a>
</div>

<script>
let productosData = [];

function getCarrito(){
  return JSON.parse(localStorage.getItem("carrito")||"[]");
}

function setCarrito(c){
  localStorage.setItem("carrito",JSON.stringify(c));
  actualizarCarrito();
}

function actualizarCarrito(){
  const c = getCarrito();
  const total = c.reduce((a,b)=>a+(b.cantidad||0),0);
  document.getElementById("btnCarrito").innerText="🛒 ("+total+")";
}

function cantidadActual(id){
  const c = getCarrito();
  const p = c.find(x=>x.id==id);
  return p ? p.cantidad : 0;
}

function cambiar(id,valor){
  let c = getCarrito();
  let i = c.findIndex(x=>x.id==id);
  let prod = productosData.find(x=>x.id==id);

  if(i==-1 && valor>0){
    c.push({...prod,cantidad:1});
  }else if(i!=-1){
    c[i].cantidad+=valor;
    if(c[i].cantidad<=0){
      c.splice(i,1);
    }
  }

  setCarrito(c);
  render();
}

function toggleDesc(id){
  const d=document.getElementById("desc-"+id);
  d.style.display = d.style.display==="block"?"none":"block";
}

async function cargar(){
  const res = await fetch("/api/productos");
  const data = await res.json();
  productosData = data;

  render();
}

function render(){
  const cont = document.getElementById("productos");
  cont.innerHTML="";

  productosData.forEach(p=>{
    const img = p.imagen || p.foto || p.image || "";

    cont.innerHTML+=`
      <div class="card">
        ${img ? `<img src="${img}" class="card-img">` : ""}
        <div class="nombre">${p.nombre}</div>
        <div class="precio">$${p.precio}</div>

        <button onclick="toggleDesc('${p.id}')">Descripción</button>
        <div id="desc-${p.id}" class="desc">${p.descripcion||""}</div>

        <div class="cantidad">
          <button onclick="cambiar('${p.id}',-1)">-</button>
          <div>${cantidadActual(p.id)}</div>
          <button onclick="cambiar('${p.id}',1)">+</button>
        </div>
      </div>
    `;
  });

  actualizarCarrito();
}

cargar();
</script>

</body>
</html>
