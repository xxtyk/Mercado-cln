<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoría</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#111;
  padding-bottom:90px;
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#000;
  color:#fff;
  padding:14px 12px;
  display:flex;
  align-items:center;
}

.volver{
  color:#fff;
  text-decoration:none;
  font-size:24px;
}

.brand{
  flex:1;
  text-align:center;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card-img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:8px;
  background:#eee;
}

.no-img{
  width:100%;
  height:120px;
  border-radius:10px;
  margin-bottom:8px;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
}

.nombre{
  font-weight:bold;
  font-size:15px;
  margin-bottom:4px;
}

.precio{
  font-size:18px;
  font-weight:bold;
}

.desc-btn{
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:13px;
  font-weight:700;
  background:#efefef;
  color:#111;
  margin-top:8px;
}

.desc{
  display:none;
  font-size:13px;
  margin-top:8px;
  background:#f8f8f8;
  padding:10px;
  border-radius:10px;
}

.cantidad{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-top:10px;
}

.cantidad button{
  width:35px;
  height:35px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
}

.cantidad-num{
  flex:1;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.carrito{
  position:fixed;
  bottom:80px;
  right:15px;
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:50px;
  text-decoration:none;
  z-index:40;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-top:1px solid #ddd;
}

.bottom a{
  text-align:center;
  padding:10px;
  text-decoration:none;
  color:#000;
}

.empty{
  background:#fff;
  border-radius:16px;
  padding:18px;
  text-align:center;
  color:#666;
  margin:12px;
}
</style>
</head>

<body>

<div class="topbar">
  <a class="volver" href="/">←</a>
  <div class="brand" id="tituloCategoria">Categoría</div>
</div>

<div class="grid" id="productos">
  <div class="empty">Cargando productos...</div>
</div>

<a href="/carrito.html" class="carrito" id="btnCarrito">🛒 (0)</a>

<div class="bottom">
  <a href="/">Inicio</a>
  <a href="/pedidos.html">Pedidos</a>
  <a href="/publicidad.html">Publicidad</a>
  <a href="/admin">Admin</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const categoriaId = params.get("id") || "";
let productosData = [];
let categoriaActual = null;

function getCarrito(){
  return JSON.parse(localStorage.getItem("carrito") || "[]");
}

function setCarrito(c){
  localStorage.setItem("carrito", JSON.stringify(c));
  actualizarCarrito();
}

function actualizarCarrito(){
  const c = getCarrito();
  const total = c.reduce((a,b)=>a + Number(b.cantidad || 0), 0);
  document.getElementById("btnCarrito").innerText = "🛒 (" + total + ")";
}

function cantidadActual(id){
  const c = getCarrito();
  const p = c.find(x => String(x.id) === String(id));
  return p ? Number(p.cantidad || 0) : 0;
}

function cambiar(id, valor){
  let c = getCarrito();
  const i = c.findIndex(x => String(x.id) === String(id));
  const prod = productosData.find(x => String(x.id) === String(id));

  if(!prod) return;

  if(i === -1 && valor > 0){
    c.push({
      id: prod.id,
      nombre: prod.nombre,
      precio: Number(prod.precio || 0),
      imagen: prod.imagen || prod.foto || prod.image || "",
      cantidad: 1
    });
  } else if(i !== -1){
    c[i].cantidad = Number(c[i].cantidad || 0) + valor;
    if(c[i].cantidad <= 0){
      c.splice(i, 1);
    }
  }

  setCarrito(c);
  render();
}

function toggleDesc(id){
  const d = document.getElementById("desc-" + id);
  if (!d) return;
  d.style.display = d.style.display === "block" ? "none" : "block";
}

async function cargar(){
  const cont = document.getElementById("productos");

  try{
    const [resCategorias, resProductos] = await Promise.all([
      fetch("/api/categorias?nocache=" + Date.now()),
      fetch("/api/productos?nocache=" + Date.now())
    ]);

    const categorias = await resCategorias.json();
    const productos = await resProductos.json();

    const listaCategorias = Array.isArray(categorias) ? categorias : [];
    const listaProductos = Array.isArray(productos) ? productos : [];

    categoriaActual = listaCategorias.find(c => String(c.id) === String(categoriaId)) || null;

    const slugCategoria = categoriaActual?.slug || "";
    const nombreCategoria = categoriaActual?.nombre || "Categoría";

    document.getElementById("tituloCategoria").innerText = nombreCategoria;
    document.title = nombreCategoria;

    productosData = listaProductos.filter(p => {
      const categoriaProd = String(p.categoria || "").trim();
      const categoriaIdProd = String(p.categoria_id || "").trim();

      return (
        String(categoriaProd) === String(slugCategoria) ||
        String(categoriaProd) === String(categoriaId) ||
        String(categoriaIdProd) === String(categoriaId) ||
        String(categoriaIdProd) === String(slugCategoria)
      );
    });

    render();
  } catch(e){
    console.error(e);
    cont.innerHTML = '<div class="empty">No se pudieron cargar los productos.</div>';
  }
}

function render(){
  const cont = document.getElementById("productos");
  cont.innerHTML = "";

  if(!productosData.length){
    cont.innerHTML = '<div class="empty">No hay productos en esta categoría.</div>';
    actualizarCarrito();
    return;
  }

  productosData.forEach(p => {
    const img = p.imagen || p.foto || p.image || "";

    cont.innerHTML += `
      <div class="card">
        ${img
          ? `<img src="${img}" class="card-img" alt="${escapeHtml(p.nombre || "")}">`
          : `<div class="no-img">📦</div>`
        }

        <div class="nombre">${escapeHtml(p.nombre || "")}</div>
        <div class="precio">$${Number(p.precio || 0).toFixed(2)}</div>

        <button class="desc-btn" onclick="toggleDesc('${String(p.id)}')">Descripción</button>
        <div id="desc-${String(p.id)}" class="desc">${escapeHtml(p.descripcion || "Sin descripción")}</div>

        <div class="cantidad">
          <button onclick="cambiar('${String(p.id)}',-1)">-</button>
          <div class="cantidad-num">${cantidadActual(p.id)}</div>
          <button onclick="cambiar('${String(p.id)}',1)">+</button>
        </div>
      </div>
    `;
  });

  actualizarCarrito();
}

function escapeHtml(valor){
  return String(valor || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

actualizarCarrito();
cargar();
</script>

</body>
</html>
