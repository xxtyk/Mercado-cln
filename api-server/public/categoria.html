<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categoría</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#111;
  padding-bottom:90px;
}

.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#000;
  color:#fff;
  padding:14px 12px;
  display:flex;
  align-items:center;
}

.volver{
  color:#fff;
  text-decoration:none;
  font-size:24px;
}

.brand{
  flex:1;
  text-align:center;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
}

.card-img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:8px;
}

.nombre{
  font-weight:bold;
}

.precio{
  font-size:18px;
  font-weight:bold;
}

.desc-btn{
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:13px;
  font-weight:700;
  background:#efefef;
  color:#111;
  margin-top:8px;
}

.desc{
  display:none;
  font-size:13px;
  margin-top:8px;
  background:#f8f8f8;
  padding:10px;
  border-radius:10px;
}

.cantidad{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-top:10px;
}

.cantidad button{
  width:35px;
  height:35px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
}

.cantidad-num{
  flex:1;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

  bottom:80px;
  right:15px;
  background:#000;
  color:#fff;
