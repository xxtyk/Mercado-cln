<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  color:#111;
}

.barra{
  background:#000;
  color:#fff;
  padding:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:0;
}

.volver{
  position:absolute;
  left:14px;
  color:#fff;
  text-decoration:none;
  font-size:28px;
}

.contenedor{
  padding:12px;
}

.item{
  background:#fff;
  padding:14px;
  margin-bottom:10px;
  border-radius:14px;
}

.total{
  font-size:22px;
  font-weight:bold;
  background:#fff;
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

.bloque{
  background:#fff;
  padding:14px;
  margin-bottom:12px;
  border-radius:14px;
}

input, textarea, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:8px;
}

button{
  width:100%;
  padding:14px;
  background:#18c10f;
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="barra">
  <a class="volver" href="/">←</a>
  <div>🛒 Carrito</div>
</div>

<div class="contenedor">

<div id="lista"></div>
<div class="total" id="total"></div>

<div class="bloque">

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<label>Tipo de entrega</label>
<select id="tipoEntrega">
  <option value="">Selecciona una opción</option>
  <option value="bodega">Recoger en bodega - $0</option>
  <option value="domicilio">Servicio a domicilio - $40</option>
</select>

<textarea id="nota" placeholder="Nota"></textarea>

</div>

<button onclick="finalizar()">FINALIZAR PEDIDO</button>

<div style="
  margin-top:12px;
  text-align:center;
  font-size:17px;
  font-weight:bold;
  line-height:1.4;
  color:#1b5e20;
  background:#e8f5e9;
  padding:14px;
  border-radius:12px;
">
  📲 El repartidor te mandará WhatsApp para ponerse de acuerdo con la entrega<br><br>
  💵 Pagas al recibir tu producto
</div>

</div>

<script>

function obtener(){
  return JSON.parse(sessionStorage.getItem("carrito") || "[]");
}

function guardar(data){
  sessionStorage.setItem("carrito", JSON.stringify(data));
}

function calcularEnvio(){
  const tipo = document.getElementById("tipoEntrega").value;

  if(tipo === "domicilio") return 40;
  if(tipo === "bodega") return 0;

  return 0;
}

function textoEntrega(){
  const tipo = document.getElementById("tipoEntrega").value;

  if(tipo === "domicilio") return "Servicio a domicilio";
  if(tipo === "bodega") return "Recoger en bodega";

  return "";
}

function cargar(){

  const carrito = obtener();

  const cont = document.getElementById("lista");

  let total = 0;

  cont.innerHTML = "";

  carrito.forEach((p,i)=>{

    const subtotal = p.precio * p.cantidad;

    total += subtotal;

    cont.innerHTML += `
      <div class="item">
        ${p.nombre}<br><br>

        $${p.precio} x ${p.cantidad}<br><br>

        <button onclick="eliminar(${i})">
          Eliminar
        </button>
      </div>
    `;
  });

  document.getElementById("total").innerHTML =
    "Total: $" + (total + calcularEnvio());
}

function eliminar(i){

  let carrito = obtener();

  carrito.splice(i,1);

  guardar(carrito);

  cargar();
}

async function finalizar(){

  const nombre = document.getElementById("nombre").value.trim();

  const telefono = document.getElementById("telefono").value.trim();

  const direccion = document.getElementById("direccion").value.trim();

  const nota = document.getElementById("nota").value.trim();

  const tipo = document.getElementById("tipoEntrega").value;

  const carrito = obtener();

  const envio = calcularEnvio();

  const subtotal = carrito.reduce(
    (s,p)=>s+(p.precio*p.cantidad),
    0
  );

  if(carrito.length === 0){
    alert("Tu carrito está vacío");
    return;
  }

  if(!nombre){
    alert("Escribe tu nombre");
    return;
  }

  if(!telefono){
    alert("Escribe tu teléfono");
    return;
  }

  if(!tipo){
    alert("Elige tipo de entrega para continuar");
    return;
  }

  if(tipo === "domicilio" && !direccion){
    alert("Escribe la dirección");
    return;
  }

  const pedido = {
    nombre,
    telefono,
    direccion,
    nota,
    entrega: textoEntrega(),
    productos: carrito,
    subtotal,
    envio,
    total: subtotal + envio
  };

  await fetch("/api/pedidos",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(pedido)
  });

  sessionStorage.removeItem("carrito");

  alert("Pedido enviado");

  window.location="/";
}

document
.getElementById("tipoEntrega")
.addEventListener("change", cargar);

cargar();

</script>

</body>
</html>
