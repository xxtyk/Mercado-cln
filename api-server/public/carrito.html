<script>
async function finalizar(){
  const carrito = obtener();

  if(!carrito.length){
    alert("Carrito vacío");
    return;
  }

  const cliente = document.getElementById("nombre").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const direccion = document.getElementById("direccion").value.trim();
  const vendedor = document.getElementById("vendedor").value.trim();
  const nota = document.getElementById("nota").value.trim();

  if(!cliente){
    alert("Escribe tu nombre");
    return;
  }

  if(!telefono){
    alert("Escribe tu WhatsApp");
    return;
  }

  if(tipoEntrega === "domicilio" && !direccion){
    alert("Escribe la dirección");
    return;
  }

  if(!vendedor){
    alert("Selecciona un vendedor");
    return;
  }

  const productos = carrito.map(p => ({
    nombre: p.nombre || "",
    cantidad: Number(p.cantidad || 1),
    precio: Number(p.precio || 0),
    imagen: p.imagen || p.foto || p.image || ""
  }));

  const subtotal = productos.reduce((t, p) => t + (p.precio * p.cantidad), 0);
  const total = subtotal + costoEntrega;

  const pedido = {
    nombre: cliente,
    telefono,
    direccion,
    vendedor,
    tipo_entrega: tipoEntrega,
    nota,
    productos,
    subtotal,
    envio: costoEntrega,
    total
  };

  try{
    const res = await fetch("/api/pedidos", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(pedido)
    });

    const data = await res.json().catch(() => ({}));

    if(!res.ok){
      alert(data.error || "No se pudo enviar el pedido");
      return;
    }

    // limpiar carrito
    localStorage.removeItem("carrito");

    alert("Pedido recibido correctamente");

    // ir al admin para ver pedido
    window.location = "/admin";

  }catch(error){
    alert("Error al enviar el pedido");
  }
}
</script>
