<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin - Mercado en Línea Culiacán</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      color:#111;
      padding-bottom:40px;
    }

    .barra{
      background:#000;
      color:#fff;
      padding:16px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      position:sticky;
      top:0;
      z-index:20;
    }

    .contenedor{
      max-width:900px;
      margin:0 auto;
      padding:12px;
    }

    .bloque{
      background:#fff;
      border-radius:16px;
      padding:14px;
      margin-bottom:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.10);
    }

    h2{
      margin:0 0 12px;
      font-size:20px;
    }

    h3{
      margin:0 0 10px;
      font-size:17px;
    }

    input, select, textarea, button{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ddd;
      margin-bottom:10px;
      font-size:15px;
      font-family:inherit;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    button{
      border:none;
      background:#000;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    button.sec{
      background:#1976d2;
    }

    button.danger{
      background:#c62828;
    }

    button.gray{
      background:#666;
    }

    .msg{
      padding:12px;
      border-radius:12px;
      margin-bottom:10px;
      font-size:14px;
    }

    .ok{
      background:#e8f5e9;
      color:#1b5e20;
    }

    .err{
      background:#ffebee;
      color:#b71c1c;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .item{
      border:1px solid #eee;
      border-radius:14px;
      padding:12px;
      background:#fafafa;
    }

    .item-top{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
    }

    .preview{
      width:72px;
      height:72px;
      border-radius:12px;
      object-fit:cover;
      background:#eee;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      overflow:hidden;
    }

    .item-title{
      font-size:17px;
      font-weight:bold;
      margin-bottom:4px;
    }

    .item-sub{
      font-size:14px;
      color:#666;
      word-break:break-word;
    }

    .acciones{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .producto-linea{
      font-size:14px;
      color:#444;
      margin-top:6px;
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      margin-bottom:14px;
    }

    .tab-btn{
      background:#fff;
      color:#111;
      border:1px solid #ddd;
    }

    .tab-btn.activa{
      background:#000;
      color:#fff;
      border-color:#000;
    }

    .seccion{
      display:none;
    }

    .seccion.activa{
      display:block;
    }

    .fila-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini{
      font-size:13px;
      color:#666;
      margin:-4px 0 10px;
    }
  </style>
</head>
<body>
  <div class="barra">Panel Admin</div>

  <div class="contenedor">
    <div id="mensaje"></div>

    <div class="tabs">
      <button class="tab-btn activa" id="tabCategoriasBtn" onclick="mostrarTab('categorias')">Categorías</button>
      <button class="tab-btn" id="tabProductosBtn" onclick="mostrarTab('productos')">Productos</button>
      <button class="tab-btn" id="tabNuevoBtn" onclick="mostrarTab('nuevo')">Agregar producto</button>
    </div>

    <div id="tabCategorias" class="seccion activa">
      <div class="bloque">
        <h2>Categorías fijas</h2>
        <div class="mini">Aquí modificas nombre, emoji y foto de las categorías que ya existen.</div>
        <div id="listaCategorias" class="grid"></div>
      </div>
    </div>

    <div id="tabProductos" class="seccion">
      <div class="bloque">
        <h2>Productos guardados</h2>
        <div id="listaProductos" class="grid"></div>
      </div>
    </div>

    <div id="tabNuevo" class="seccion">
      <div class="bloque">
        <h2>Agregar producto</h2>

        <input id="nuevoNombre" type="text" placeholder="Nombre del producto" />
        <input id="nuevoPrecio" type="number" step="0.01" placeholder="Precio" />
        <select id="nuevoCategoria"></select>
        <input id="nuevoImagen" type="text" placeholder="URL de imagen" />
        <textarea id="nuevoDescripcion" placeholder="Descripción"></textarea>

        <button onclick="guardarProducto()">Guardar producto</button>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "mercado2024";

    let categorias = [];
    let productos = [];

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${ADMIN_PASSWORD}`
      };
    }

    function mostrarMensaje(texto, ok = true) {
      const box = document.getElementById("mensaje");
      box.innerHTML = `<div class="msg ${ok ? "ok" : "err"}">${texto}</div>`;
      window.scrollTo({ top: 0, behavior: "smooth" });
      setTimeout(() => {
        box.innerHTML = "";
      }, 3500);
    }

    function mostrarTab(tab) {
      document.getElementById("tabCategorias").classList.remove("activa");
      document.getElementById("tabProductos").classList.remove("activa");
      document.getElementById("tabNuevo").classList.remove("activa");

      document.getElementById("tabCategoriasBtn").classList.remove("activa");
      document.getElementById("tabProductosBtn").classList.remove("activa");
      document.getElementById("tabNuevoBtn").classList.remove("activa");

      if (tab === "categorias") {
        document.getElementById("tabCategorias").classList.add("activa");
        document.getElementById("tabCategoriasBtn").classList.add("activa");
      }

      if (tab === "productos") {
        document.getElementById("tabProductos").classList.add("activa");
        document.getElementById("tabProductosBtn").classList.add("activa");
      }

      if (tab === "nuevo") {
        document.getElementById("tabNuevo").classList.add("activa");
        document.getElementById("tabNuevoBtn").classList.add("activa");
      }
    }

    async function cargarCategorias() {
      try {
        const res = await fetch("/api/categorias?nocache=" + Date.now());
        categorias = await res.json();

        if (!Array.isArray(categorias)) {
          categorias = [];
        }

        renderCategorias();
        llenarSelectCategorias();
      } catch (e) {
        mostrarMensaje("No se pudieron cargar las categorías", false);
      }
    }

    async function cargarProductos() {
      try {
        const res = await fetch("/api/productos?nocache=" + Date.now());
        productos = await res.json();

        if (!Array.isArray(productos)) {
          productos = [];
        }

        renderProductos();
      } catch (e) {
        mostrarMensaje("No se pudieron cargar los productos", false);
      }
    }

    function llenarSelectCategorias() {
      const select = document.getElementById("nuevoCategoria");
      select.innerHTML = "";

      categorias.forEach(cat => {
        const op = document.createElement("option");
        op.value = cat.slug || "";
        op.textContent = cat.nombre || "Categoría";
        select.appendChild(op);
      });
    }

    function renderCategorias() {
      const cont = document.getElementById("listaCategorias");

      if (!categorias.length) {
        cont.innerHTML = `<div class="item">No hay categorías.</div>`;
        return;
      }

      cont.innerHTML = "";

      categorias.forEach(cat => {
        const div = document.createElement("div");
        div.className = "item";

        const preview = cat.imagen
          ? `<img src="${cat.imagen}" class="preview" alt="${cat.nombre}">`
          : `<div class="preview">${cat.emoji || "🛍️"}</div>`;

        div.innerHTML = `
          <div class="item-top">
            ${preview}
            <div>
              <div class="item-title">${cat.nombre || "Sin nombre"}</div>
              <div class="item-sub">Slug: ${cat.slug || ""}</div>
            </div>
          </div>

          <input id="cat_nombre_${cat.id}" type="text" value="${escapeHtml(cat.nombre || "")}" placeholder="Nombre">
          <input id="cat_emoji_${cat.id}" type="text" value="${escapeHtml(cat.emoji || "🛍️")}" placeholder="Emoji">
          <input id="cat_imagen_${cat.id}" type="text" value="${escapeHtml(cat.imagen || "")}" placeholder="URL de imagen">

          <div class="acciones">
            <button class="sec" onclick="guardarCategoria('${cat.id}')">Guardar cambios</button>
            <button class="gray" onclick="recargarTodo()">Recargar</button>
          </div>
        `;

        cont.appendChild(div);
      });
    }

    function nombreCategoriaPorSlug(slug) {
      const cat = categorias.find(c => String(c.slug) === String(slug));
      return cat ? cat.nombre : slug;
    }

    function renderProductos() {
      const cont = document.getElementById("listaProductos");

      if (!productos.length) {
        cont.innerHTML = `<div class="item">No hay productos guardados.</div>`;
        return;
      }

      cont.innerHTML = "";

      productos.forEach(p => {
        const div = document.createElement("div");
        div.className = "item";

        const preview = p.imagen
          ? `<img src="${p.imagen}" class="preview" alt="${p.nombre}">`
          : `<div class="preview">📦</div>`;

        div.innerHTML = `
          <div class="item-top">
            ${preview}
            <div>
              <div class="item-title">${p.nombre || "Sin nombre"}</div>
              <div class="item-sub">$${Number(p.precio || 0).toFixed(2)}</div>
              <div class="producto-linea">Categoría: ${nombreCategoriaPorSlug(p.categoria || "otro")}</div>
            </div>
          </div>

          <div class="acciones">
            <button class="danger" onclick="eliminarProducto(${Number(p.id)})">Eliminar</button>
            <button class="gray" onclick="recargarTodo()">Recargar</button>
          </div>
        `;

        cont.appendChild(div);
      });
    }

    async function guardarCategoria(id) {
      const nombre = document.getElementById(`cat_nombre_${id}`).value.trim();
      const emoji = document.getElementById(`cat_emoji_${id}`).value.trim() || "🛍️";
      const imagen = document.getElementById(`cat_imagen_${id}`).value.trim();

      if (!nombre) {
        mostrarMensaje("El nombre de la categoría es obligatorio", false);
        return;
      }

      try {
        const res = await fetch(`/api/categorias/${id}`, {
          method: "PUT",
          headers: authHeaders(),
          body: JSON.stringify({ nombre, emoji, imagen })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          mostrarMensaje(data.error || "No se pudo guardar la categoría", false);
          return;
        }

        mostrarMensaje("Categoría actualizada");
        await cargarCategorias();
      } catch (e) {
        mostrarMensaje("Error al guardar categoría", false);
      }
    }

    async function guardarProducto() {
      const nombre = document.getElementById("nuevoNombre").value.trim();
      const precio = document.getElementById("nuevoPrecio").value.trim();
      const categoria = document.getElementById("nuevoCategoria").value.trim();
      const imagen = document.getElementById("nuevoImagen").value.trim();
      const descripcion = document.getElementById("nuevoDescripcion").value.trim();

      if (!nombre) {
        mostrarMensaje("Ponle nombre al producto", false);
        return;
      }

      if (precio === "") {
        mostrarMensaje("Ponle precio al producto", false);
        return;
      }

      try {
        const res = await fetch("/api/admin/producto", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            nombre,
            precio: Number(precio),
            categoria,
            imagen,
            descripcion,
            etiqueta: "Nuevo"
          })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          mostrarMensaje(data.error || "No se pudo guardar el producto", false);
          return;
        }

        document.getElementById("nuevoNombre").value = "";
        document.getElementById("nuevoPrecio").value = "";
        document.getElementById("nuevoImagen").value = "";
        document.getElementById("nuevoDescripcion").value = "";

        mostrarMensaje("Producto guardado");
        await cargarProductos();
        mostrarTab("productos");
      } catch (e) {
        mostrarMensaje("Error al guardar producto", false);
      }
    }

    async function eliminarProducto(id) {
      if (!confirm("¿Eliminar este producto?")) return;

      try {
        const res = await fetch(`/api/admin/producto/${id}`, {
          method: "DELETE",
          headers: authHeaders()
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          mostrarMensaje(data.error || "No se pudo eliminar el producto", false);
          return;
        }

        mostrarMensaje("Producto eliminado");
        await cargarProductos();
      } catch (e) {
        mostrarMensaje("Error al eliminar producto", false);
      }
    }

    async function recargarTodo() {
      await cargarCategorias();
      await cargarProductos();
    }

    function escapeHtml(valor) {
      return String(valor || "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    recargarTodo();
  </script>
</body>
</html>
