<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  color:#111;
}

.barra{
  background:#000;
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:20;
}

.contenedor{
  padding:12px;
  max-width:800px;
  margin:0 auto;
}

.bloque{
  background:#fff;
  padding:14px;
  margin-bottom:14px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.10);
}

h3{
  margin:0 0 12px;
  font-size:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  background:#fff;
}

input[type="file"]{
  padding:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  font-weight:bold;
  font-size:16px;
}

.btn{
  background:#000;
  color:#fff;
}

.btn-verde{
  background:#18c10f;
  color:#fff;
}

.btn-rojo{
  background:#d32f2f;
  color:#fff;
}

.btn-gris{
  background:#666;
  color:#fff;
}

.tarjeta{
  border:1px solid #eee;
  border-radius:12px;
  padding:12px;
  margin-top:10px;
  background:#fafafa;
}

.linea{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:4px 0;
  align-items:center;
}

.acciones{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.acciones button{
  margin-top:0;
  width:auto;
  padding:10px 12px;
}

.foto-mini{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
  background:#eee;
  display:block;
  margin-top:8px;
}

.estado{
  margin-top:8px;
  font-size:14px;
  color:#333;
}
</style>
</head>
<body>

<div class="barra">Panel Admin</div>

<div class="contenedor">

  <div class="bloque">
    <h3>📦 Pedidos</h3>
    <div id="pedidos">Cargando...</div>
  </div>

  <div class="bloque">
    <h3>👥 Vendedores</h3>
    <input id="venNombre" placeholder="Nombre del vendedor">
    <button class="btn" onclick="agregarVendedor()">Guardar vendedor</button>
    <div id="listaVendedores"></div>
  </div>

  <div class="bloque">
    <h3>📂 Agregar Categoría</h3>
    <input id="catNombre" placeholder="Nombre">
    <input id="catArchivo" type="file" accept="image/*">
    <button class="btn-verde" onclick="subirFotoCategoria()">Subir foto desde el celular</button>
    <div id="catEstado" class="estado"></div>
    <img id="catPreview" class="foto-mini" style="display:none;">
    <button class="btn" onclick="agregarCategoria()">Guardar categoría</button>
  </div>

  <div class="bloque">
    <h3>🛒 Agregar Producto</h3>
    <input id="prodNombre" placeholder="Nombre">
    <input id="prodPrecio" placeholder="Precio">
    <input id="prodArchivo" type="file" accept="image/*">
    <button class="btn-verde" onclick="subirFotoProducto()">Subir foto desde el celular</button>
    <div id="prodEstado" class="estado"></div>
    <img id="prodPreview" class="foto-mini" style="display:none;">
    <select id="prodCategoria">
      <option value="">Selecciona una categoría</option>
    </select>
    <button class="btn" onclick="agregarProducto()">Guardar producto</button>
  </div>

</div>

<script>
let catImagenSubida = "";
let prodImagenSubida = "";

async function subirArchivo(inputId, estadoId, previewId){
  const input = document.getElementById(inputId);
  const estado = document.getElementById(estadoId);
  const preview = document.getElementById(previewId);

  if(!input.files || !input.files[0]){
    alert("Selecciona una foto");
    return "";
  }

  const formData = new FormData();
  formData.append("file", input.files[0]);

  estado.textContent = "Subiendo foto...";

  try{
    const res = await fetch("/api/admin/upload", {
      method:"POST",
      body: formData
    });

    const data = await res.json().catch(() => ({}));

    if(!res.ok || !data.url){
      alert(data.error || "No se pudo subir la foto");
      estado.textContent = "";
      return "";
    }

    preview.src = data.url;
    preview.style.display = "block";
    estado.textContent = "Foto subida correctamente";
    return data.url;

  }catch(error){
    estado.textContent = "";
    alert("Error al subir la foto");
    return "";
  }
}

async function subirFotoCategoria(){
  const url = await subirArchivo("catArchivo", "catEstado", "catPreview");
  if(url){
    catImagenSubida = url;
  }
}

async function subirFotoProducto(){
  const url = await subirArchivo("prodArchivo", "prodEstado", "prodPreview");
  if(url){
    prodImagenSubida = url;
  }
}

async function cargarPedidos(){
  const res = await fetch("/api/pedidos");
  const data = await res.json().catch(() => []);

  const cont = document.getElementById("pedidos");
  cont.innerHTML = "";

  if(!Array.isArray(data) || !data.length){
    cont.innerHTML = `<div class="tarjeta">No hay pedidos todavía.</div>`;
    return;
  }

  data.forEach(p=>{
    const productosHtml = Array.isArray(p.productos)
      ? p.productos.map(item => `
          <div class="linea">
            <span>${item.nombre || ""} x${Number(item.cantidad || 1)}</span>
            <span>$${Number(item.precio || 0) * Number(item.cantidad || 1)}</span>
          </div>
        `).join("")
      : "";

    const div = document.createElement("div");
    div.className = "tarjeta";

    div.innerHTML = `
      <b>${p.nombre || "Sin nombre"}</b><br>
      Tel: ${p.telefono || ""}<br>
      Dirección: ${p.direccion || ""}<br>
      Vendedor: ${p.vendedor || ""}<br>
      Entrega: ${p.tipo_entrega || ""}<br>
      Nota: ${p.nota || ""}<br><br>

      ${productosHtml}

      <div class="linea"><b>Subtotal</b><b>$${Number(p.subtotal || 0)}</b></div>
      <div class="linea"><b>Envío</b><b>$${Number(p.envio || 0)}</b></div>
      <div class="linea"><b>Total</b><b>$${Number(p.total || 0)}</b></div>

      <div class="acciones">
        <button class="btn-verde" onclick="enviar('${p.id}')">Enviar WhatsApp</button>
        <button class="btn-rojo" onclick="eliminarPedido('${p.id}')">Eliminar</button>
      </div>
    `;

    cont.appendChild(div);
  });
}

async function eliminarPedido(id){
  await fetch("/api/pedidos/" + id, { method:"DELETE" });
  cargarPedidos();
}

async function enviar(id){
  await fetch("/api/pedidos/" + id + "/whatsapp", { method:"POST" });
  cargarPedidos();
}

async function agregarCategoria(){
  const nombre = document.getElementById("catNombre").value.trim();

  if(!nombre){
    alert("Escribe el nombre de la categoría");
    return;
  }

  if(!catImagenSubida){
    alert("Primero sube la foto desde el celular");
    return;
  }

  await fetch("/api/admin/categoria", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      nombre,
      imagen: catImagenSubida
    })
  });

  alert("Categoría guardada");
  document.getElementById("catNombre").value = "";
  document.getElementById("catArchivo").value = "";
  document.getElementById("catEstado").textContent = "";
  document.getElementById("catPreview").style.display = "none";
  catImagenSubida = "";
  cargarCategoriasEnSelect();
}

async function agregarProducto(){
  const nombre = document.getElementById("prodNombre").value.trim();
  const precio = Number(document.getElementById("prodPrecio").value || 0);
  const categoria = document.getElementById("prodCategoria").value;

  if(!nombre){
    alert("Escribe el nombre del producto");
    return;
  }

  if(!precio){
    alert("Escribe el precio");
    return;
  }

  if(!categoria){
    alert("Selecciona una categoría");
    return;
  }

  if(!prodImagenSubida){
    alert("Primero sube la foto desde el celular");
    return;
  }

  await fetch("/api/admin/producto", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      nombre,
      precio,
      imagen: prodImagenSubida,
      categoria
    })
  });

  alert("Producto guardado");
  document.getElementById("prodNombre").value = "";
  document.getElementById("prodPrecio").value = "";
  document.getElementById("prodArchivo").value = "";
  document.getElementById("prodCategoria").value = "";
  document.getElementById("prodEstado").textContent = "";
  document.getElementById("prodPreview").style.display = "none";
  prodImagenSubida = "";
}

async function cargarCategoriasEnSelect(){
  try{
    const res = await fetch("/api/categorias");
    const data = await res.json().catch(() => []);
    const select = document.getElementById("prodCategoria");

    if(!select) return;

    select.innerHTML = `<option value="">Selecciona una categoría</option>`;

    if(Array.isArray(data)){
      data.forEach(cat => {
        const valor = cat.id || cat.slug || cat.nombre || "";
        const texto = cat.nombre || "Sin nombre";

        const option = document.createElement("option");
        option.value = valor;
        option.textContent = texto;
        select.appendChild(option);
      });
    }
  }catch(error){
    console.log("No se pudieron cargar categorías");
  }
}

async function cargarVendedores(){
  const res = await fetch("/api/vendedores");
  const data = await res.json().catch(() => []);

  const cont = document.getElementById("listaVendedores");
  cont.innerHTML = "";

  if(!Array.isArray(data) || !data.length){
    cont.innerHTML = `<div class="tarjeta">No hay vendedores todavía.</div>`;
    return;
  }

  data.forEach(v => {
    const div = document.createElement("div");
    div.className = "tarjeta";
    div.innerHTML = `
      <div class="linea">
        <b>${v.nombre}</b>
      </div>
      <div class="acciones">
        <button class="btn-gris" onclick="editarVendedor('${v.id}', '${String(v.nombre).replace(/'/g, "\\'")}')">Editar</button>
        <button class="btn-rojo" onclick="eliminarVendedor('${v.id}')">Eliminar</button>
      </div>
    `;
    cont.appendChild(div);
  });
}

async function agregarVendedor(){
  const nombre = document.getElementById("venNombre").value.trim();

  if(!nombre){
    alert("Escribe el nombre del vendedor");
    return;
  }

  await fetch("/api/vendedores", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ nombre })
  });

  document.getElementById("venNombre").value = "";
  alert("Vendedor guardado");
  cargarVendedores();
}

async function editarVendedor(id, nombreActual){
  const nuevoNombre = prompt("Editar vendedor", nombreActual);

  if(nuevoNombre === null) return;

  const nombre = nuevoNombre.trim();

  if(!nombre){
    alert("El nombre no puede ir vacío");
    return;
  }

  await fetch("/api/vendedores/" + id, {
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ nombre })
  });

  alert("Vendedor actualizado");
  cargarVendedores();
}

async function eliminarVendedor(id){
  await fetch("/api/vendedores/" + id, { method:"DELETE" });
  cargarVendedores();
}

cargarPedidos();
cargarVendedores();
cargarCategoriasEnSelect();
</script>

</body>
</html>
