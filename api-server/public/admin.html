<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

.barra{
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.contenedor{
  padding:10px;
}

.bloque{
  background:#fff;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:5px;
  font-weight:bold;
}

.btn{
  background:#000;
  color:#fff;
}

.btn-rojo{
  background:red;
  color:#fff;
}
</style>

</head>
<body>

<div class="barra">Panel Admin</div>

<div class="contenedor">

  <div class="bloque">
    <h3>📦 Pedidos</h3>
    <div id="pedidos"></div>
  </div>

  <div class="bloque">
    <h3>📂 Agregar Categoría</h3>
    <input id="catNombre" placeholder="Nombre">
    <input id="catImagen" placeholder="URL imagen">
    <button class="btn" onclick="agregarCategoria()">Guardar</button>
  </div>

  <div class="bloque">
    <h3>🛒 Agregar Producto</h3>
    <input id="prodNombre" placeholder="Nombre">
    <input id="prodPrecio" placeholder="Precio">
    <input id="prodImagen" placeholder="Imagen URL">
    <input id="prodCategoria" placeholder="Categoria slug">
    <button class="btn" onclick="agregarProducto()">Guardar</button>
  </div>

</div>

<script>

async function cargarPedidos(){
  const res = await fetch("/api/pedidos");
  const data = await res.json();

  const cont = document.getElementById("pedidos");
  cont.innerHTML = "";

  data.forEach(p=>{
    const div = document.createElement("div");
    div.className="bloque";

    div.innerHTML = `
      <b>${p.nombre}</b><br>
      Total: $${p.total}<br><br>

      <button onclick="enviar('${p.id}')">Enviar WhatsApp</button>
      <button class="btn-rojo" onclick="eliminar('${p.id}')">Eliminar</button>
    `;

    cont.appendChild(div);
  });
}

async function eliminar(id){
  await fetch("/api/pedidos/"+id,{method:"DELETE"});
  cargarPedidos();
}

async function enviar(id){
  await fetch("/api/pedidos/"+id+"/whatsapp",{method:"POST"});
  cargarPedidos();
}

async function agregarCategoria(){
  await fetch("/api/admin/categoria",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:catNombre.value,
      imagen:catImagen.value
    })
  });
  alert("Guardado");
}

async function agregarProducto(){
  await fetch("/api/admin/producto",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      nombre:prodNombre.value,
      precio:Number(prodPrecio.value),
      imagen:prodImagen.value,
      categoria:prodCategoria.value
    })
  });
  alert("Guardado");
}

cargarPedidos();

</script>

</body>
</html>
