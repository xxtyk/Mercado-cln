<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin - Mercado en Línea Culiacán</title>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      color:#111;
      padding-bottom:40px;
    }

    .barra{
      background:#000;
      color:#fff;
      padding:16px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      position:sticky;
      top:0;
      z-index:20;
    }

    .contador-visitas{
      max-width:900px;
      margin:12px auto;
      background:#000;
      color:#fff;
      padding:14px;
      border-radius:16px;
      font-size:20px;
      font-weight:bold;
      text-align:center;
      box-shadow:0 2px 10px rgba(0,0,0,.15);
    }

    .contenedor{
      max-width:900px;
      margin:0 auto;
      padding:12px;
    }

    .bloque{
      background:#fff;
      border-radius:16px;
      padding:14px;
      margin-bottom:14px;
      box-shadow:0 2px 10px rgba(0,0,0,.10);
    }

    h2{
      margin:0 0 12px;
      font-size:20px;
    }

    input, select, textarea, button{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ddd;
      margin-bottom:10px;
      font-size:15px;
      font-family:inherit;
    }

    button{
      border:none;
      background:#000;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .tabs{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:8px;
      margin-bottom:14px;
    }

    .tab-btn{
      background:#fff;
      color:#111;
      border:1px solid #ddd;
    }

    .tab-btn.activa{
      background:#000;
      color:#fff;
      border-color:#000;
    }

    .seccion{display:none}
    .seccion.activa{display:block}

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .item{
      border:1px solid #eee;
      border-radius:14px;
      padding:12px;
      background:#fafafa;
    }

    .item-top{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
    }

    .preview{
      width:72px;
      height:72px;
      border-radius:12px;
      object-fit:cover;
      background:#eee;
      flex-shrink:0;
    }

    .acciones{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .danger{background:#c62828}
    .gray{background:#666}
    .sec{background:#1976d2}

    .mini{
      font-size:13px;
      color:#666;
      margin:-4px 0 10px;
    }
  </style>
</head>

<body>

<div class="barra">Panel Admin</div>

<div class="contador-visitas">
  👁️ Visitas hoy:
  <span id="visitasHoy">cargando...</span>
</div>

<div class="contenedor">

  <div class="tabs">
    <button class="tab-btn activa" id="tabCategoriasBtn" onclick="mostrarTab('categorias')">Categorías</button>

    <button class="tab-btn" id="tabProductosBtn" onclick="mostrarTab('productos')">Productos</button>

    <button class="tab-btn" id="tabNuevoBtn" onclick="mostrarTab('nuevo')">Agregar producto</button>

    <button class="tab-btn" id="tabVendedoresBtn" onclick="mostrarTab('vendedores')">Vendedores</button>
  </div>

  <div id="tabCategorias" class="seccion activa">

    <div class="bloque">
      <h2>Nueva categoría</h2>

      <div class="mini">
        Aquí puedes agregar categorías nuevas.
      </div>

      <input type="text" placeholder="Nombre de la categoría">

      <input type="text" placeholder="Emoji">

      <input type="file">

      <button>Guardar categoría</button>
    </div>

    <div class="bloque">
      <h2>Categorías guardadas</h2>

      <div id="listaCategorias" class="grid"></div>
    </div>

  </div>

</div>

<script>

async function cargarVisitas(){

  try{

    const res = await fetch("/api/visitas-hoy?nocache=" + Date.now());

    const data = await res.json();

    document.getElementById("visitasHoy").textContent =
      data.total ?? 0;

  }catch(e){

    document.getElementById("visitasHoy").textContent =
      "no disponible";

  }

}

function mostrarTab(tab){

  const tabs = [
    "categorias",
    "productos",
    "nuevo",
    "vendedores"
  ];

  tabs.forEach(t => {

    const sec =
      document.getElementById(
        "tab" +
        t.charAt(0).toUpperCase() +
        t.slice(1)
      );

    const btn =
      document.getElementById(
        "tab" +
        t.charAt(0).toUpperCase() +
        t.slice(1) +
        "Btn"
      );

    if(sec) sec.classList.remove("activa");

    if(btn) btn.classList.remove("activa");

  });

  document.getElementById(
    "tab" +
    tab.charAt(0).toUpperCase() +
    tab.slice(1)
  ).classList.add("activa");

  document.getElementById(
    "tab" +
    tab.charAt(0).toUpperCase() +
    tab.slice(1) +
    "Btn"
  ).classList.add("activa");

}

cargarVisitas();

</script>

</body>
</html>
