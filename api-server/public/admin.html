<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f3f3f3;
      color:#111;
    }

    .barra{
      background:#000;
      color:#fff;
      padding:16px;
      font-size:28px;
      font-weight:bold;
      text-align:center;
      position:sticky;
      top:0;
      z-index:20;
    }

    .contenedor{
      max-width:900px;
      margin:0 auto;
      padding:14px;
      padding-bottom:40px;
    }

    .top{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:16px;
    }

    .boton-volver{
      display:inline-block;
      background:#fff;
      color:#111;
      text-decoration:none;
      padding:12px 14px;
      border-radius:12px;
      font-weight:bold;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      width:fit-content;
    }

    .acciones{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-recargar{
      background:#000;
      color:#fff;
    }

    .btn-clave{
      background:#fff;
      color:#111;
      border:1px solid #ddd;
    }

    .estado{
      background:#fff;
      border-radius:14px;
      padding:14px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
      font-size:16px;
    }

    .lista{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
