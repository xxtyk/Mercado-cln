<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

<!-- META FACEBOOK / WHATSAPP -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://mercado-cln-1.onrender.com/">

<meta property="og:title" content="Haz tu pedido aquí | Mercado en Línea Culiacán">
<meta property="og:description" content="Entregas el mismo día 🚚 y pagas al recibir 💵. Compra fácil y rápido desde tu celular.">

<meta property="og:image" content="https://mercado-cln-1.onrender.com/IMG-20260114-WA0001.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Haz tu pedido aquí | Mercado en Línea Culiacán">
<meta name="twitter:description" content="Entregas el mismo día 🚚 y pagas al recibir 💵.">
<meta name="twitter:image" content="https://mercado-cln-1.onrender.com/IMG-20260114-WA0001.jpg">

<meta name="description" content="Haz tu pedido aquí. Entregas el mismo día y pagas al recibir.">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#111;
  padding-bottom:100px;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.splash-contenido{
  width:100%;
  max-width:360px;
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  text-align:center;
}

.logo-splash{
  width:220px;
  max-width:85%;
}

.texto-instalar{
  color:#fff;
  font-size:22px;
  font-weight:bold;
  line-height:1.3;
  margin:0;
}

.subtexto-instalar{
  color:#d9d9d9;
  font-size:15px;
  line-height:1.4;
  margin:0;
}

/* BOTÓN AZUL */
.btn-instalar-splash{
  width:100%;
  padding:18px 16px;
  border:none;
  border-radius:28px;
  background:linear-gradient(135deg,#2b5cff,#4a7dff);
  color:#fff;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 6px 18px rgba(0,0,0,.30);
  transition:all .2s ease;
}

.btn-instalar-splash:active{
  transform:scale(0.96);
}

/* HEADER */
.barra{
  background:#000;
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:50;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:6px;
  text-decoration:none;
  color:#111;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  text-align:center;
}

.card-img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:14px;
}

.emoji{
  font-size:70px;
  margin:22px 0 14px;
}

.card-title{
  font-weight:bold;
  font-size:16px;
  margin-top:8px;
}

/* VACÍO */
.empty{
  background:#fff;
  padding:16px;
  border-radius:14px;
  text-align:center;
}

/* BOTÓN CARRITO */
.carrito-btn{
  position:fixed;
  bottom:90px;
  right:16px;
  background:#25d366;
  color:#fff;
  padding:12px 16px;
  border-radius:28px;
  font-weight:bold;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
  text-decoration:none;
  z-index:100;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-contenido">
    <img src="/IMG-20260114-WA0001.jpg" class="logo-splash">

    <p class="texto-instalar">
      Para instalar tu aplicación toca el botón azul
    </p>

    <button id="btnInstalarSplash" class="btn-instalar-splash">
      Descarga aquí la app
    </button>

    <p class="subtexto-instalar">
      Instálala gratis en tu celular
    </p>
  </div>
</div>

<div class="barra">
  Mercado en Línea Culiacán
</div>

<div id="categorias" class="grid"></div>

<a href="/carrito.html" class="carrito-btn">🛒 Ver carrito</a>

<script>
let deferredPrompt = null;

// DETECTAR INSTALACIÓN
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

// BOTÓN INSTALAR
document.getElementById("btnInstalarSplash").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
  } else {
    alert("Para instalar, abre el menú del navegador y toca 'Agregar a pantalla de inicio'");
  }
});

// CARGAR CATEGORÍAS
async function cargarCategorias() {
  const cont = document.getElementById("categorias");

  try {
    const res = await fetch("/api/categorias?nocache=" + Date.now());
    const data = await res.json();

    cont.innerHTML = "";

    data.forEach(c => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = `/categoria.html?id=${encodeURIComponent(c.id || "")}`;

      const imagen = c.imagen
        ? `<img class="card-img" src="${c.imagen}">`
        : `<div class="emoji">🛍️</div>`;

      a.innerHTML = `
        ${imagen}
        <div class="card-title">${c.nombre}</div>
      `;

      cont.appendChild(a);
    });

  } catch (e) {
    cont.innerHTML = `<div class="empty">Error cargando</div>`;
  }
}

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js").catch(console.error);
  });
}

// INICIO
window.onload = () => {
  cargarCategorias();

  const splashYaVisto = sessionStorage.getItem("splashYaVisto");

  if (splashYaVisto === "si") {
    document.getElementById("splash").style.display = "none";
  } else {
    sessionStorage.setItem("splashYaVisto", "si");
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
    }, 5000);
  }
};
</script>

</body>
</html>
