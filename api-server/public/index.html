<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#111;
  padding-bottom:100px;
}

/* HEADER */
.barra{
  background:#000;
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:50;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  text-decoration:none;
  color:#111;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  text-align:center;
}

.card-img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:10px;
}

.emoji{
  font-size:50px;
  margin:20px 0;
}

.card-title{
  font-weight:bold;
  font-size:16px;
}

/* VACÍO */
.empty{
  background:#fff;
  padding:16px;
  border-radius:14px;
  text-align:center;
}

/* BOTÓN CARRITO */
.carrito-btn{
  position:fixed;
  bottom:90px;
  right:16px;
  background:#25d366;
  color:#fff;
  padding:12px 16px;
  border-radius:28px;
  font-weight:bold;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
  text-decoration:none;
  font-size:16px;
  z-index:100;
}
</style>
</head>

<body>

<div class="barra">
  Mercado en Línea Culiacán
</div>

<div id="categorias" class="grid"></div>

<a href="/carrito.html" class="carrito-btn">🛒 Ver carrito</a>

<script>
async function cargarCategorias() {
  const cont = document.getElementById("categorias");

  if (!cont) return;

  try {
    const res = await fetch("/api/categorias?nocache=" + Date.now());
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      cont.innerHTML = `<div class="empty">No hay categorías todavía.</div>`;
      return;
    }

    cont.innerHTML = "";

    data.forEach(c => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = `/categoria.html?id=${encodeURIComponent(c.id || "")}`;

      const imagen = c.imagen
        ? `<img class="card-img" src="${c.imagen}" alt="">`
        : `<div class="emoji">${c.emoji || "🛍️"}</div>`;

      a.innerHTML = `
        ${imagen}
        <div class="card-title">${c.nombre || "Categoría"}</div>
      `;

      cont.appendChild(a);
    });

  } catch (e) {
    console.error(e);
    cont.innerHTML = `<div class="empty">Error cargando categorías.</div>`;
  }
}

window.onload = cargarCategorias;
</script>

</body>
</html>
