<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

<meta property="og:type" content="website">
<meta property="og:title" content="Haz tu pedido aquí | Mercado en Línea Culiacán">
<meta property="og:description" content="Entregas el mismo día en Culiacán y pagas al recibir.">
<meta property="og:url" content="https://mercado-cln-1.onrender.com/">
<meta property="og:image" content="https://i.supaimg.com/f87c0974-d754-4d1e-a931-5da93884dab4/27aa4f9c-e4b7-445d-b14f-775740bbcffd.png">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  color:#111;
  padding-bottom:90px;
}

.header{
  background:#000;
  color:#fff;
  text-align:center;
  font-size:34px;
  font-weight:bold;
  padding:26px 10px;
  position:sticky;
  top:0;
  z-index:100;
}

.contenedor{padding:18px}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  text-decoration:none;
  color:#111;
  display:block;
  box-shadow:0 4px 16px rgba(0,0,0,.14);
  padding:8px;
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
  border-radius:18px;
  display:block;
  background:#eee;
}

.nombre{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:14px 6px 6px;
  line-height:1.15;
}

.btn-carrito{
  position:fixed;
  left:14px;
  right:14px;
  bottom:14px;
  background:#18d85b;
  color:#fff;
  text-decoration:none;
  text-align:center;
  padding:16px;
  border-radius:18px;
  font-size:22px;
  font-weight:bold;
  z-index:999;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
}

.vacio{
  background:#fff;
  padding:20px;
  border-radius:18px;
  text-align:center;
  grid-column:1/-1;
}

#splash{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.splash-box{
  width:100%;
  max-width:380px;
}

.splash-logo{
  width:170px;
  max-width:70%;
  border-radius:18px;
  margin-bottom:18px;
}

.splash-title{
  font-size:26px;
  font-weight:bold;
  margin-bottom:12px;
}

.splash-text{
  font-size:17px;
  line-height:1.4;
  margin-bottom:18px;
}

.splash-btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  font-size:18px;
  font-weight:bold;
  margin:10px 0;
}

.azul{background:#1976ff;color:#fff}
.blanco{background:#fff;color:#000}
.gris{background:#222;color:#fff;border:1px solid #555}

@media(max-width:430px){
  .header{font-size:30px}
  .contenedor{padding:14px}
  .grid{gap:14px}
  .card img{height:185px}
  .nombre{font-size:18px}
}
</style>
</head>

<body>

<div id="splash">
  <div class="splash-box">

    <img
      class="splash-logo"
      src="/logo-negro.png"
      alt="Mercado en Línea Culiacán"
    >

    <div class="splash-title">Mercado en Línea Culiacán</div>

    <div class="splash-text">
      Puedes comprar sin descargar la app.<br>
      Si deseas instalarla toca el botón azul.<br><br>
      <b>Solo Android</b>
    </div>

    <button id="btnInstalar" class="splash-btn azul">
      Android: descargar aplicación
    </button>

    <button id="btnEntrar" class="splash-btn blanco">
      Entrar sin descargar
    </button>

    <button id="btnCatalogo" class="splash-btn gris">
      Ver catálogo
    </button>

  </div>
</div>

<div class="header">
  Mercado en Línea Culiacán
</div>

<div class="contenedor">
  <div id="categorias" class="grid"></div>
</div>

<a class="btn-carrito" href="/carrito.html">
  🛒 Ver carrito
</a>

<script>
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function cerrarSplash(){
  const splash = document.getElementById("splash");
  if(!splash) return;

  splash.style.transition = "opacity .5s ease";
  splash.style.opacity = "0";
  splash.style.pointerEvents = "none";

  setTimeout(() => {
    splash.remove();
  }, 500);
}

window.addEventListener("load", () => {
  const btnInstalar = document.getElementById("btnInstalar");
  const btnEntrar = document.getElementById("btnEntrar");
  const btnCatalogo = document.getElementById("btnCatalogo");

  if(btnEntrar) btnEntrar.onclick = cerrarSplash;
  if(btnCatalogo) btnCatalogo.onclick = cerrarSplash;

  if(btnInstalar){
    btnInstalar.onclick = async () => {
      if(deferredPrompt){
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      }
      cerrarSplash();
    };
  }
});
</script>

<script>
async function cargarCategorias(){
  const cont = document.getElementById("categorias");

  try{
    const res = await fetch("/api/categorias?nocache=" + Date.now());
    const categorias = await res.json();

    if(!Array.isArray(categorias) || categorias.length === 0){
      cont.innerHTML = `<div class="vacio">No hay categorías disponibles.</div>`;
      return;
    }

    cont.innerHTML = categorias.map(c => {
      const nombre = c.nombre || "Categoría";
      const imagen = c.imagen || c.foto || c.image || "/img/no-image.png";
      const emoji = c.emoji || "";

      return `
        <a class="card" href="/categoria.html?id=${encodeURIComponent(c.id)}">
          <img src="${imagen}" alt="${nombre}" onerror="this.src='/img/no-image.png'">
          <div class="nombre">${emoji} ${nombre}</div>
        </a>
      `;
    }).join("");

  }catch(e){
    cont.innerHTML = `<div class="vacio">No se pudieron cargar las categorías.</div>`;
  }
}

cargarCategorias();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/service-worker.js").catch(() => {});
}
</script>

</body>
</html>
