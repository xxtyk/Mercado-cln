<script>
window.addEventListener("load", () => {

  const splash = document.getElementById("splash");

  if(splash){

    splash.style.transition = "opacity .5s ease";

    setTimeout(() => {

      splash.style.opacity = "0";

      setTimeout(() => {
        splash.style.display = "none";
      }, 500);

    }, 8000);

  }

});
</script>
