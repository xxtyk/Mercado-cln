<script>
  async function cargarCategorias() {
    const cont = document.getElementById("categorias");

    try {
      // 🔥 evita cache (esto es la clave)
      const res = await fetch("/api/categorias?nocache=" + Date.now());
      const data = await res.json();

      console.log("CATEGORIAS:", data); // 👈 para debug

      if (!Array.isArray(data) || data.length === 0) {
        cont.innerHTML = `<div class="empty">No hay categorías todavía.</div>`;
        return;
      }

      cont.innerHTML = "";

      data.forEach(c => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = `/categoria.html?id=${encodeURIComponent(c.id || "")}`;

        const imagen = c.imagen
          ? `<img class="card-img" src="${c.imagen}" alt="${c.nombre}">`
          : `<div class="emoji">${c.emoji || "🛍️"}</div>`;

        a.innerHTML = `
          ${imagen}
          <div class="card-title">${c.nombre || "Categoría"}</div>
        `;

        cont.appendChild(a);
      });

    } catch (e) {
      console.error(e);
      cont.innerHTML = `<div class="empty">Error cargando categorías.</div>`;
    }
  }

  // 🔥 recarga siempre al entrar
  window.onload = cargarCategorias;
</script>
