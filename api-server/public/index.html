<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado en Línea Culiacán</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">

<meta property="og:type" content="website">
<meta property="og:title" content="Haz tu pedido aquí | Mercado en Línea Culiacán">
<meta property="og:description" content="Haz tu pedido aquí para que el repartidor te lo entregue. Entregas el mismo día y pagas al recibir.">
<meta property="og:url" content="https://mercado-cln-1.onrender.com/">
<meta property="og:image" content="https://i.supaimg.com/f87c0974-d754-4d1e-a931-5da93884dab4/27aa4f9c-e4b7-445d-b14f-775740bbcffd.png">
<meta property="og:image:secure_url" content="https://i.supaimg.com/f87c0974-d754-4d1e-a931-5da93884dab4/27aa4f9c-e4b7-445d-b14f-775740bbcffd.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Haz tu pedido aquí | Mercado en Línea Culiacán">
<meta name="twitter:description" content="Haz tu pedido aquí para que el repartidor te lo entregue. Entregas el mismo día y pagas al recibir.">
<meta name="twitter:image" content="https://i.supaimg.com/f87c0974-d754-4d1e-a931-5da93884dab4/27aa4f9c-e4b7-445d-b14f-775740bbcffd.png">

<meta name="description" content="Haz tu pedido aquí para que el repartidor te lo entregue. Entregas el mismo día y pagas al recibir.">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#111;
  padding-bottom:100px;
}

#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.splash-contenido{
  width:100%;
  max-width:380px;
  padding:22px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  text-align:center;
}

.logo-splash{
  width:210px;
  max-width:85%;
}

.texto-principal{
  color:#fff;
  font-size:25px;
  font-weight:bold;
  line-height:1.25;
  margin:0;
}

.texto-secundario{
  color:#d9d9d9;
  font-size:16px;
  line-height:1.35;
  margin:0 0 4px;
}

.btn-splash{
  width:100%;
  padding:15px 14px;
  border:none;
  border-radius:24px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.btn-android{
  background:linear-gradient(135deg,#2b5cff,#4a7dff);
  color:#fff;
}

.btn-comprar{
  background:#fff;
  color:#111;
}

.btn-iphone{
  background:#222;
  color:#fff;
  border:1px solid #555;
}

.texto-auto{
  color:#aaa;
  font-size:14px;
  margin-top:2px;
}

.barra{
  background:#000;
  color:#fff;
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:50;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:6px;
  text-decoration:none;
  color:#111;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  text-align:center;
}

.card-img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:14px;
}

.emoji{
  font-size:70px;
  margin:22px 0 14px;
}

.card-title{
  font-weight:bold;
  font-size:16px;
  margin-top:8px;
}

.empty{
  background:#fff;
  padding:16px;
  border-radius:14px;
  text-align:center;
}

.carrito-btn{
  position:fixed;
  bottom:90px;
  right:16px;
  background:#25d366;
  color:#fff;
  padding:12px 16px;
  border-radius:28px;
  font-weight:bold;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
  text-decoration:none;
  z-index:100;
}
</style>
</head>

<body>

<div id="splash">
  <div class="splash-contenido">
    <img src="/IMG-20260114-WA0001.jpg" class="logo-splash" alt="Mercado en Línea Culiacán">

    <p class="texto-principal">
      🚚 Entregas el mismo día<br>
      💵 Pagas hasta recibir
    </p>

    <p class="texto-secundario">
      Puedes comprar sin instalar la aplicación
    </p>

    <button id="btnInstalarSplash" class="btn-splash btn-android">
      📲 Instalar app Android
    </button>

    <button id="btnComprarSinInstalar" class="btn-splash btn-comprar">
      🛒 Comprar sin instalar
    </button>

    <button id="btnIphone" class="btn-splash btn-iphone">
      🍎 Entrar desde iPhone
    </button>

    <div class="texto-auto">
      Entrando automáticamente en 3 segundos...
    </div>
  </div>
</div>

<div class="barra">
  Mercado en Línea Culiacán
</div>

<div id="categorias" class="grid">
  <div class="empty">Cargando categorías...</div>
</div>

<a href="/carrito.html" class="carrito-btn">🛒 Ver carrito</a>

<script>
let deferredPrompt = null;

const splash = document.getElementById("splash");
const btnInstalar = document.getElementById("btnInstalarSplash");
const btnComprar = document.getElementById("btnComprarSinInstalar");
const btnIphone = document.getElementById("btnIphone");

function cerrarSplash(){
  splash.style.display = "none";
}

function esIphoneOApple() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  return /iPhone|iPad|iPod/i.test(ua);
}

function appYaInstalada() {
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

window.addEventListener("appinstalled", () => {
  deferredPrompt = null;
  alert("App instalada correctamente");
  cerrarSplash();
});

btnInstalar.addEventListener("click", async () => {
  if (appYaInstalada()) {
    cerrarSplash();
    return;
  }

  if (deferredPrompt) {
    try {
      await deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      cerrarSplash();
      return;
    } catch (error) {
      alert("Si no sale la instalación, toca los 3 puntitos arriba y luego 'Agregar a pantalla de inicio'.");
      return;
    }
  }

  if (esIphoneOApple()) {
    alert("En iPhone toca Compartir y luego 'Agregar a inicio'. También puedes comprar sin instalar.");
    return;
  }

  alert("Si no sale la instalación, toca los 3 puntitos arriba y luego 'Agregar a pantalla de inicio'.");
});

btnComprar.addEventListener("click", () => {
  cerrarSplash();
});

btnIphone.addEventListener("click", () => {
  cerrarSplash();
});

async function cargarCategorias() {
  const cont = document.getElementById("categorias");

  try {
    const res = await fetch("/api/categorias?nocache=" + Date.now());

    if (!res.ok) {
      cont.innerHTML = '<div class="empty">Error cargando categorías</div>';
      return;
    }

    let data = await res.json();

    if (Array.isArray(data)) {
      data = data;
    } else if (data && Array.isArray(data.categorias)) {
      data = data.categorias;
    } else if (data && Array.isArray(data.data)) {
      data = data.data;
    } else {
      data = [];
    }

    cont.innerHTML = "";

    if (data.length === 0) {
      cont.innerHTML = '<div class="empty">No hay categorías disponibles</div>';
      return;
    }

    data.forEach(c => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = "/categoria.html?id=" + encodeURIComponent(c.id || "");

      const imagen = c.imagen
        ? '<img class="card-img" src="' + c.imagen + '" alt="' + (c.nombre || "Categoría") + '">'
        : '<div class="emoji">' + (c.emoji || "🛍️") + '</div>';

      a.innerHTML = imagen + '<div class="card-title">' + (c.nombre || "Categoría") + '</div>';
      cont.appendChild(a);
    });

  } catch (e) {
    console.error(e);
    cont.innerHTML = '<div class="empty">No se pudieron cargar las categorías</div>';
  }
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js").catch(console.error);
  });
}

window.onload = () => {
  cargarCategorias();

  if (appYaInstalada()) {
    cerrarSplash();
    return;
  }

  setTimeout(() => {
    cerrarSplash();
  }, 3000);
};
</script>

</body>
</html>
