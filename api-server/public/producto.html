<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  color:#111;
}

.header{
  background:#000;
  color:#fff;
  padding:18px 14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

.btn-volver{
  position:fixed;
  top:12px;
  left:12px;
  width:46px;
  height:46px;
  border-radius:50%;
  background:rgba(0,0,0,0.75);
  color:#fff;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  z-index:999;
  box-shadow:0 3px 10px rgba(0,0,0,.35);
}

.img-container{
  width:100%;
  height:80vh;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.img-container img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.info{
  padding:14px;
}

.nombre{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
}

.precio{
  font-size:22px;
  color:#18c10f;
  font-weight:bold;
  margin-bottom:10px;
}

.descripcion{
  font-size:16px;
  color:#555;
  margin-bottom:14px;
  line-height:1.4;
}

.cantidad{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-top:12px;
}

.cantidad button{
  width:48px;
  height:48px;
  border:none;
  border-radius:12px;
  background:#000;
  color:#fff;
  font-size:28px;
  font-weight:bold;
}

.numero{
  min-width:60px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background:#fff;
  border:1px solid #ddd;
  font-size:22px;
  font-weight:bold;
}

.carrito{
  display:block;
  margin-top:14px;
  text-align:center;
  text-decoration:none;
  background:#000;
  color:#fff;
  padding:14px;
  border-radius:12px;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>

<body>

<a href="javascript:history.back()" class="btn-volver">‹</a>

<div class="header">
  Producto
</div>

<div class="img-container">
  <img id="imgProducto">
</div>

<div class="info">
  <div class="nombre" id="nombre"></div>
  <div class="precio" id="precio"></div>
  <div class="descripcion" id="descripcion"></div>

  <div class="cantidad">
    <button onclick="quitar()">-</button>
    <div class="numero" id="cantidadProducto">0</div>
    <button onclick="agregar()">+</button>
  </div>

  <a href="/carrito.html" class="carrito">🛒 Ver carrito</a>
</div>

<script>
let producto = null;

function obtenerCarrito(){
  return JSON.parse(localStorage.getItem("carrito") || "[]");
}

function guardarCarrito(data){
  localStorage.setItem("carrito", JSON.stringify(data));
  actualizarCantidad();
}

function actualizarCantidad(){
  if(!producto) return;

  const carrito = obtenerCarrito();
  const encontrado = carrito.find(p => String(p.id) === String(producto.id));
  document.getElementById("cantidadProducto").textContent = encontrado ? encontrado.cantidad : 0;
}

function agregar(){
  if(!producto) return;

  let carrito = obtenerCarrito();
  const existente = carrito.find(p => String(p.id) === String(producto.id));

  if (existente){
    existente.cantidad += 1;
  } else {
    carrito.push({
      id: producto.id,
      nombre: producto.nombre,
      precio: Number(producto.precio || 0),
      imagen: producto.imagen || producto.foto || producto.image || "",
      descripcion: producto.descripcion || "",
      cantidad: 1
    });
  }

  guardarCarrito(carrito);
}

function quitar(){
  if(!producto) return;

  let carrito = obtenerCarrito();
  const index = carrito.findIndex(p => String(p.id) === String(producto.id));

  if(index === -1) return;

  carrito[index].cantidad -= 1;

  if(carrito[index].cantidad <= 0){
    carrito.splice(index, 1);
  }

  guardarCarrito(carrito);
}

async function cargarProducto(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) return;

  const res = await fetch("/api/productos/" + encodeURIComponent(id) + "?nocache=" + Date.now());
  producto = await res.json();

  const img = producto.imagen || producto.foto || producto.image || "";

  document.getElementById("imgProducto").src = img || "";
  document.getElementById("nombre").textContent = producto.nombre || "";
  document.getElementById("precio").textContent = "$" + Number(producto.precio || 0).toFixed(2);
  document.getElementById("descripcion").textContent = producto.descripcion || "";

  actualizarCantidad();
}

cargarProducto();
</script>

</body>
</html>
